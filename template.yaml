blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] — [Changelog](https://github.com/nicolinuxfr/smart-lights-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  source_url: https://github.com/nicolinuxfr/smart-lights-blueprint/blob/main/template.yaml
  input:
    [[include:inputs.yaml]]

mode: parallel
max: 10
max_exceeded: silent
trace:
  stored_traces: 20

trigger_variables:
  control_entities_off_var: !input control_entities_off
  automation_entity_id: "{{ this.entity_id }}"

variables:
  [[include:variables.yaml]]

trigger:
  [[include:triggers.yaml]]

condition:
  [[include:conditions.yaml]]

action:
  - choose:
      - conditions:
          - "{{ auto_onoff_enabled | bool }}"
          - condition: trigger
            id:
              - sensor_on
              - control_on
        sequence:
          - variables:
              sensors_active: >-
                {% if trigger.id == 'control_on' %}
                  {{ expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
                {% else %}
                  {{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}
                {% endif %}
              controls_valid: >-
                {% set controls_off = control_entities_off %}
                {% set off_ok = controls_off in (none, [], '')
                   or expand(controls_off) | rejectattr('state', 'eq', 'off') | list | count == 0 %}
                {{ off_ok }}
              turn_on_allowed: >-
                {% set mode = auto_on_mode if auto_on_mode in ['day', 'night', 'always'] else 'day' %}
                {% if mode == 'always' %}
                  true
                {% elif mode == 'night' %}
                  {{ is_night_mode | bool }}
                {% else %}
                  {{ not (is_night_mode | bool) }}
                {% endif %}
          - condition: "{{ sensors_active | bool }}"
          - condition: "{{ controls_valid | bool }}"
          - condition: "{{ turn_on_allowed | bool }}"
          - if:
              - "{{ enable_adaptive | bool }}"
            then:
              - variables:
                  [[include:adaptive_variables.yaml]]
              - action: light.turn_on
                target: !input lights
                data:
                  brightness_pct: "{{ effective_brightness | int(0) }}"
                  color_temp_kelvin: "{{ effective_kelvin | int(0) }}"
                  transition: 1
            else:
              - action: light.turn_on
                target: !input lights

      - conditions:
          - "{{ auto_onoff_enabled | bool }}"
          - condition: trigger
            id:
              - sensor_off
              - control_off
              - ha_start
              - automation_reenabled
        sequence:
          - condition: >-
              {{ trigger.id != 'automation_reenabled'
                 or (
                   expand(expanded_light_entities)
                   | selectattr('state', 'eq', 'on')
                   | list | count
                 ) > 0 }}
          - wait_for_trigger:
              - trigger: state
                entity_id: !input sensors
                to: "on"
                not_from:
                  - "unavailable"
                  - "unknown"
            timeout: !input off_delay
            continue_on_timeout: true
          - condition: "{{ wait.trigger is none }}"
          - variables:
              controls_valid: >-
                {% set controls_off = control_entities_off %}
                {% set off_ok = controls_off in (none, [], '')
                   or expand(controls_off) | rejectattr('state', 'eq', 'off') | list | count == 0 %}
                {{ off_ok }}
              off_conditions_still_met: >-
                {% set controls_off = control_entities_off %}
                {% set has_controls = controls_off not in (none, [], '') %}
                {% if trigger.id in ['control_off', 'automation_reenabled'] %}
                  {{ (controls_valid | bool) or (has_controls and not (controls_valid | bool)) }}
                {% else %}
                  {{ controls_valid | bool }}
                {% endif %}
              sensors_clear: >-
                {% if not keep_on_open_doors %}
                  {{ expand(sensors)
                     | selectattr('attributes.device_class', 'in', ['motion', 'occupancy', 'presence'])
                     | selectattr('state', 'eq', 'on')
                     | list | count == 0 }}
                {% else %}
                  {{ expand(sensors)
                     | selectattr('state', 'eq', 'on')
                     | list | count == 0 }}
                {% endif %}
          - condition: "{{ off_conditions_still_met | bool }}"
          - condition: "{{ sensors_clear | bool }}"
          - action: light.turn_off
            target: !input lights

      - conditions:
          - "{{ auto_onoff_enabled | bool }}"
          - condition: trigger
            id:
              - switch_toggled
        sequence:
          - variables:
              switch_event_valid: >-
                {{ switch_entity not in ('', none)
                   and trigger.event is defined
                   and trigger.event.data is defined
                   and trigger.event.data.new_state is not none
                   and trigger.event.data.old_state is not none
                   and trigger.event.data.old_state.state not in ['unavailable', 'unknown']
                   and trigger.event.data.new_state.state not in ['unavailable', 'unknown'] }}
              switch_turning_on: >-
                {{ (switch_event_valid | bool) and trigger.event.data.new_state.state == 'on' }}
              switch_turning_off: >-
                {{ (switch_event_valid | bool) and trigger.event.data.new_state.state == 'off' }}
              target_lights_count: >-
                {{ expand(expanded_light_entities) | list | count }}
              target_lights_on_count: >-
                {{ expand(expanded_light_entities) | selectattr('state', 'eq', 'on') | list | count }}
              all_target_lights_off: >-
                {{ (target_lights_on_count | int(0)) == 0 }}
              all_target_lights_on: >-
                {{ (target_lights_count | int(0)) > 0
                   and (target_lights_on_count | int(0)) == (target_lights_count | int(0)) }}
          - condition: "{{ switch_event_valid | bool }}"
          - if:
              - "{{ switch_turning_off | bool }}"
              - "{{ not (all_target_lights_off | bool) }}"
            then:
              - action: light.turn_off
                target: !input lights
            else:
              - if:
                  - "{{ switch_turning_on | bool }}"
                  - "{{ not (all_target_lights_on | bool) }}"
                then:
                  - if:
                      - "{{ enable_adaptive | bool }}"
                    then:
                      - variables:
                          [[include:adaptive_variables.yaml]]
                      - action: light.turn_on
                        target: !input lights
                        data:
                          brightness_pct: "{{ effective_brightness | int(0) }}"
                          color_temp_kelvin: "{{ effective_kelvin | int(0) }}"
                          transition: 1
                    else:
                      - action: light.turn_on
                        target: !input lights

      - conditions:
          - condition: trigger
            id:
              - lights_all_on
        sequence:
          - if:
              - >
                {{ switch_entity not in ['', none]
                   and is_state(switch_entity, 'off') }}
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ switch_entity }}"

      - conditions:
          - condition: trigger
            id:
              - lights_all_off
        sequence:
          - if:
              - >
                {{ switch_entity not in ['', none]
                   and is_state(switch_entity, 'on') }}
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ switch_entity }}"
          - if:
              - >
                {{ (restore_on_off | bool)
                   and auto_mode_input_entity not in ['', none]
                   and auto_mode_input_entity.startswith('input_boolean.')
                   and is_state(auto_mode_input_entity, 'off') }}
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ auto_mode_input_entity }}"
              - stop: "Restored control entity after all lights turned off"

      - conditions:
          - condition: trigger
            id:
              - lights_color_mode_active
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: "{{ auto_mode_input_entity }}"
          - stop: "Handled color mode change"

      - conditions:
          - "{{ enable_adaptive | bool }}"
          - condition: trigger
            id:
              - lights_any_on
          - >
            {{ auto_mode_input_entity in ['', none]
               or is_state(auto_mode_input_entity, 'on') }}
        sequence:
          - variables:
              on_lights: >
                {{ expand(expanded_light_entities)
                   | selectattr('state', 'eq', 'on')
                   | map(attribute='entity_id')
                   | list }}
          - condition: "{{ on_lights | count > 0 }}"
          - delay:
              milliseconds: 200
          - variables:
              [[include:adaptive_variables.yaml]]
          - repeat:
              for_each: "{{ on_lights }}"
              sequence:
                - variables:
                    current_light: "{{ repeat.item }}"
                - variables:
                    modes: "{{ state_attr(current_light, 'supported_color_modes') or [] }}"
                    modes_count: "{{ modes | count }}"
                    min_k: "{{ state_attr(current_light, 'min_color_temp_kelvin') | float(0) }}"
                    max_k: "{{ state_attr(current_light, 'max_color_temp_kelvin') | float(0) }}"
                    has_brightness_attr: "{{ state_attr(current_light, 'brightness') is not none }}"
                    has_ct_kelvin_attr: "{{ state_attr(current_light, 'color_temp_kelvin') is not none }}"
                    has_ct_attr: "{{ state_attr(current_light, 'color_temp') is not none }}"
                    onoff_only: "{{ (modes_count == 1) and (modes[0] == 'onoff') }}"
                    supports_ct: >
                      {{ 'color_temp' in modes
                         or (min_k > 0 and max_k > 0)
                         or has_ct_kelvin_attr
                         or has_ct_attr }}
                    supports_brightness: >
                      {{ has_brightness_attr
                         or (modes_count == 0)
                         or not onoff_only }}
                    clamped_kelvin: >
                      {% if min_k > 0 and max_k > 0 %}
                        {{ [min_k, [effective_kelvin | float(0), max_k] | min] | max | round(0) | int }}
                      {% else %}
                        {{ effective_kelvin | int(0) }}
                      {% endif %}
                - choose:
                    - conditions:
                        - "{{ (supports_brightness | bool) and (supports_ct | bool) }}"
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 1
                            brightness_pct: "{{ effective_brightness | int(0) }}"
                            color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
                    - conditions:
                        - "{{ supports_brightness | bool }}"
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 1
                            brightness_pct: "{{ effective_brightness | int(0) }}"
                    - conditions:
                        - "{{ supports_ct | bool }}"
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 1
                            color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"

      - conditions:
          - "{{ enable_adaptive | bool }}"
          - condition: trigger
            id:
              - tick
              - sun_event
              - auto_mode_enabled
              - night_mode_changed
              - night_lux_changed
              - automations_reload_service
          - >
            {% if trigger.id == 'auto_mode_enabled' %}
              {{ auto_mode_input_entity not in ['', none]
                 and trigger.event is defined
                 and trigger.event.data is defined
                 and trigger.event.data.new_state is not none
                 and trigger.event.data.new_state.state == 'on'
                 and (trigger.event.data.old_state is none or trigger.event.data.old_state.state != 'on') }}
            {% elif trigger.id == 'night_mode_changed' %}
              {{ night_mode_entity_id not in ['', none]
                 and trigger.event is defined
                 and trigger.event.data is defined
                 and trigger.event.data.new_state is not none
                 and (trigger.event.data.old_state is none
                    or trigger.event.data.old_state.state != trigger.event.data.new_state.state) }}
            {% else %}
              true
            {% endif %}
          - >
            {{ auto_mode_input_entity in ['', none]
               or is_state(auto_mode_input_entity, 'on') }}
        sequence:
          - variables:
              on_lights: >
                {{ expand(expanded_light_entities)
                   | selectattr('state', 'eq', 'on')
                   | map(attribute='entity_id')
                   | list }}
          - condition: "{{ on_lights | count > 0 }}"
          - variables:
              [[include:adaptive_variables.yaml]]
          - repeat:
              for_each: "{{ on_lights }}"
              sequence:
                - variables:
                    current_light: "{{ repeat.item }}"
                - variables:
                    modes: "{{ state_attr(current_light, 'supported_color_modes') or [] }}"
                    modes_count: "{{ modes | count }}"
                    min_k: "{{ state_attr(current_light, 'min_color_temp_kelvin') | float(0) }}"
                    max_k: "{{ state_attr(current_light, 'max_color_temp_kelvin') | float(0) }}"
                    has_brightness_attr: "{{ state_attr(current_light, 'brightness') is not none }}"
                    has_ct_kelvin_attr: "{{ state_attr(current_light, 'color_temp_kelvin') is not none }}"
                    has_ct_attr: "{{ state_attr(current_light, 'color_temp') is not none }}"
                    onoff_only: "{{ (modes_count == 1) and (modes[0] == 'onoff') }}"
                    supports_ct: >
                      {{ 'color_temp' in modes
                         or (min_k > 0 and max_k > 0)
                         or has_ct_kelvin_attr
                         or has_ct_attr }}
                    supports_brightness: >
                      {{ has_brightness_attr
                         or (modes_count == 0)
                         or not onoff_only }}
                    clamped_kelvin: >
                      {% if min_k > 0 and max_k > 0 %}
                        {{ [min_k, [effective_kelvin | float(0), max_k] | min] | max | round(0) | int }}
                      {% else %}
                        {{ effective_kelvin | int(0) }}
                      {% endif %}
                    tick_updates_brightness: "{{ trigger.id == 'tick' and ((now_ts | int(0) // 300) % 2 == 0) }}"
                    recently_turned_on: >
                      {% set last_changed_ts = as_timestamp(states[current_light].last_changed) | float(0) %}
                      {{ is_state(current_light, 'on') and ((now_ts | float(0)) - last_changed_ts) < 20 }}
                    current_brightness_pct: >
                      {% set b = state_attr(current_light, 'brightness') %}
                      {% if b is not none %}
                        {{ [1, [((b | float(0)) / 2.55) | round(0) | int, 100] | min] | max }}
                      {% else %}
                        {{ effective_brightness | int(0) }}
                      {% endif %}
                - choose:
                    - conditions:
                        - >
                          {{ trigger.id == 'tick'
                             and (supports_brightness | bool)
                             and (supports_ct | bool)
                             and (recently_turned_on | bool) }}
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 15
                            brightness_pct: "{{ effective_brightness | int(0) }}"
                            color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
                    - conditions:
                        - >
                          {{ trigger.id == 'tick'
                             and (supports_brightness | bool)
                             and (supports_ct | bool)
                             and not (recently_turned_on | bool)
                             and (tick_updates_brightness | bool) }}
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 15
                            brightness_pct: "{{ effective_brightness | int(0) }}"
                    - conditions:
                        - >
                          {{ trigger.id == 'tick'
                             and (supports_brightness | bool)
                             and (supports_ct | bool)
                             and not (recently_turned_on | bool)
                             and not (tick_updates_brightness | bool) }}
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 15
                            brightness_pct: "{{ effective_brightness | int(0) if night_adaptive_active else current_brightness_pct | int(0) }}"
                            color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
                    - conditions:
                        - "{{ (supports_brightness | bool) and (supports_ct | bool) }}"
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 1
                            brightness_pct: "{{ effective_brightness | int(0) }}"
                            color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
                    - conditions:
                        - "{{ supports_brightness | bool }}"
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 1
                            brightness_pct: "{{ effective_brightness | int(0) }}"
                    - conditions:
                        - "{{ supports_ct | bool }}"
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 1
                            color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
                  default:
                    - action: light.turn_on
                      continue_on_error: true
                      target:
                        entity_id: "{{ current_light }}"
                      data:
                        transition: 1
