blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] — [Changelog](https://github.com/nicolinuxfr/smart-lights-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  source_url: https://github.com/nicolinuxfr/smart-lights-blueprint/blob/main/template.yaml
  input:
    lights:
      name: "[[input.lights.name]]"
      description: "[[input.lights.description]]"
      selector:
        target:
          entity:
            domain: light
    enable_auto_onoff:
      name: "[[input.enable_auto_onoff.name]]"
      description: "[[input.enable_auto_onoff.description]]"
      default: true
      selector:
        boolean:
    enable_adaptive:
      name: "[[input.enable_adaptive.name]]"
      description: "[[input.enable_adaptive.description]]"
      default: false
      selector:
        boolean:

    auto_onoff_sensors_section:
      name: "[[section.auto_onoff.sensors]]"
      icon: mdi:motion-sensor
      description: "[[section.auto_onoff.sensors.description]]"
      collapsed: false
      input:
        sensors:
          name: "[[input.sensors.name]]"
          description: "[[input.sensors.description]]"
          default: []
          selector:
            entity:
              domain: binary_sensor
              multiple: true
        switch_devices:
          name: "[[input.switch_devices.name]]"
          description: "[[input.switch_devices.description]]"
          default: []
          selector:
            device:
              filter:
                - integration: zha
                - integration: mqtt
              multiple: true
        switch_event_entities:
          name: "[[input.switch_event_entities.name]]"
          description: "[[input.switch_event_entities.description]]"
          default: []
          selector:
            entity:
              domain: event
              multiple: true
        switch_action:
          name: "[[input.switch_action.name]]"
          description: "[[input.switch_action.description]]"
          default: ""
          selector:
            text:
        off_delay:
          name: "[[input.off_delay.name]]"
          description: "[[input.off_delay.description]]"
          default:
            hours: 0
            minutes: 2
            seconds: 0
          selector:
            duration:

    auto_onoff_conditions_section:
      name: "[[section.auto_onoff.conditions]]"
      icon: mdi:weather-sunny
      description: "[[section.auto_onoff.conditions.description]]"
      collapsed: true
      input:
        night_only:
          name: "[[input.night_only.name]]"
          description: "[[input.night_only.description]]"
          default: false
          selector:
            boolean:
        light_sensors:
          name: "[[input.light_sensors.name]]"
          description: "[[input.light_sensors.description]]"
          default: []
          selector:
            entity:
              domain: sensor
              device_class: illuminance
              multiple: true
        light_threshold:
          name: "[[input.light_threshold.name]]"
          description: "[[input.light_threshold.description]]"
          default: 30
          selector:
            number:
              min: 0
              max: 1000
              unit_of_measurement: lx
              mode: box

    auto_onoff_advanced_section:
      name: "[[section.auto_onoff.advanced]]"
      icon: mdi:cog-outline
      description: "[[section.auto_onoff.advanced.description]]"
      collapsed: true
      input:
        keep_on_open_doors:
          name: "[[input.keep_on_open_doors.name]]"
          description: "[[input.keep_on_open_doors.description]]"
          default: false
          selector:
            boolean:
        control_entities:
          name: "[[input.control_entities.name]]"
          description: "[[input.control_entities.description]]"
          default: []
          selector:
            entity:
              domain: input_boolean
              multiple: true

    adaptive_settings_section:
      name: "[[section.adaptive.settings]]"
      icon: mdi:tune-vertical
      description: "[[section.adaptive.settings.description]]"
      collapsed: false
      input:
        brightness_night:
          name: "[[input.brightness_night.name]]"
          description: "[[input.brightness_night.description]]"
          default: 30
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"
        brightness_day:
          name: "[[input.brightness_day.name]]"
          description: "[[input.brightness_day.description]]"
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"
        kelvin_night:
          name: "[[input.kelvin_night.name]]"
          description: "[[input.kelvin_night.description]]"
          default: 2700
          selector:
            number:
              min: 1800
              max: 5000
              step: 50
              mode: slider
              unit_of_measurement: K
        kelvin_day:
          name: "[[input.kelvin_day.name]]"
          description: "[[input.kelvin_day.description]]"
          default: 5500
          selector:
            number:
              min: 2200
              max: 9000
              step: 50
              mode: slider
              unit_of_measurement: K

    adaptive_advanced_section:
      name: "[[section.adaptive.advanced]]"
      icon: mdi:cog
      description: "[[section.adaptive.advanced.description]]"
      collapsed: true
      input:
        auto_mode_boolean:
          name: "[[input.auto_mode_boolean.name]]"
          description: "[[input.auto_mode_boolean.description]]"
          default: ""
          selector:
            entity:
              filter:
                - domain: input_boolean
                - domain: binary_sensor
        restore_on_off:
          name: "[[input.restore_on_off.name]]"
          description: "[[input.restore_on_off.description]]"
          default: false
          selector:
            boolean:
        disable_on_color:
          name: "[[input.disable_on_color.name]]"
          description: "[[input.disable_on_color.description]]"
          default: false
          selector:
            boolean:
        weather_entity:
          name: "[[input.weather_entity.name]]"
          description: "[[input.weather_entity.description]]"
          default: ""
          selector:
            entity:
              domain: weather

    adaptive_night_mode_section:
      name: "[[section.adaptive.night_mode]]"
      icon: mdi:weather-night
      description: "[[section.adaptive.night_mode.description]]"
      collapsed: true
      input:
        night_mode_entity:
          name: "[[input.night_mode_entity.name]]"
          description: "[[input.night_mode_entity.description]]"
          default: ""
          selector:
            entity:
              filter:
                - domain: input_boolean
                - domain: binary_sensor
        night_mode_brightness:
          name: "[[input.night_mode_brightness.name]]"
          description: "[[input.night_mode_brightness.description]]"
          default: 20
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"
        night_mode_kelvin:
          name: "[[input.night_mode_kelvin.name]]"
          description: "[[input.night_mode_kelvin.description]]"
          default: 2200
          selector:
            number:
              min: 1800
              max: 5000
              step: 50
              mode: slider
              unit_of_measurement: K

mode: parallel
max: 10
max_exceeded: silent

trigger_variables:
  control_var: !input control_entities

variables:
  # Feature flags
  enable_auto_onoff: !input enable_auto_onoff
  enable_adaptive: !input enable_adaptive
  # Auto on/off variables
  control_entities: !input control_entities
  sensors: !input sensors
  switch_devices: !input switch_devices
  switch_event_entities: !input switch_event_entities
  switch_action: !input switch_action
  switch_device_names: >
    {% set ns = namespace(names=[]) %}
    {% for d in switch_devices %}
      {% set ns.names = ns.names + [device_attr(d, 'name')] %}
    {% endfor %}
    {{ ns.names }}
  keep_on_open_doors: !input keep_on_open_doors
  light_sensors: !input light_sensors
  light_threshold: !input light_threshold
  night_only: !input night_only
  # Adaptive variables
  auto_mode_input_entity: !input auto_mode_boolean
  disable_on_color: !input disable_on_color
  restore_on_off: !input restore_on_off
  b_night: !input brightness_night
  b_day: !input brightness_day
  k_night: !input kelvin_night
  k_day: !input kelvin_day
  lights: !input lights
  expanded_light_entities: >
    {% set target = lights %}
    {% set ns = namespace(entities=[]) %}
    {% if target.entity_id is defined %}
      {% set ids = [target.entity_id] if target.entity_id is string else target.entity_id %}
      {% set ns.entities = ns.entities + ids %}
    {% endif %}
    {% if target.area_id is defined %}
      {% set areas = [target.area_id] if target.area_id is string else target.area_id %}
      {% for a in areas %}
        {% set ns.entities = ns.entities + (area_entities(a) | select('match', 'light\\.') | list) %}
      {% endfor %}
    {% endif %}
    {% if target.device_id is defined %}
      {% set devices = [target.device_id] if target.device_id is string else target.device_id %}
      {% for d in devices %}
        {% set ns.entities = ns.entities + (device_entities(d) | select('match', 'light\\.') | list) %}
      {% endfor %}
    {% endif %}
    {{ ns.entities | unique | list }}
  weather_entity_id: !input weather_entity
  night_mode_entity_id: !input night_mode_entity
  nm_brightness: !input night_mode_brightness
  nm_kelvin: !input night_mode_kelvin

trigger:
  # ===== AUTO ON/OFF TRIGGERS =====
  - trigger: state
    entity_id: !input sensors
    to: "on"
    not_from:
      - "unavailable"
      - "unknown"
    id: sensor_on

  - trigger: state
    entity_id: !input sensors
    to: "off"
    not_from:
      - "unavailable"
      - "unknown"
    id: sensor_off

  - trigger: state
    entity_id: !input sensors
    from: "unavailable"
    to: "off"
    id: ha_start

  - trigger: state
    entity_id: !input sensors
    from: "unknown"
    to: "off"
    id: ha_start

  - trigger: template
    value_template: >-
      {{ control_var not in (none, [], '') and
         expand(control_var) | rejectattr('state', 'eq', 'on') | list | count == 0 }}
    id: control_on

  - trigger: template
    value_template: >-
      {{ control_var not in (none, [], '') and
         expand(control_var) | selectattr('state', 'eq', 'off') | list | count > 0 }}
    id: control_off

  - trigger: state
    entity_id: !input switch_event_entities
    id: switch_toggled

  - trigger: event
    event_type: zha_event
    id: switch_toggled

  - trigger: mqtt
    topic: "zigbee2mqtt/+/action"
    id: switch_toggled

  # ===== ADAPTIVE LIGHTING TRIGGERS =====
  - trigger: time_pattern
    alias: Tick every 5 minutes
    minutes: "/5"
    id: tick

  - trigger: event
    alias: Auto mode entity changed
    event_type: state_changed
    event_data:
      entity_id: !input auto_mode_boolean
    id: auto_mode_enabled

  - trigger: event
    alias: Night mode entity changed
    event_type: state_changed
    event_data:
      entity_id: !input night_mode_entity
    id: night_mode_changed

  - trigger: event
    alias: Automations reloaded
    event_type: call_service
    event_data:
      domain: automation
      service: reload
    id: automations_reload_service

  - trigger: event
    alias: Target light state changed
    event_type: state_changed
    id: light_state_changed

  - trigger: sun
    alias: Sunrise
    event: sunrise
    id: sun_event

  - trigger: sun
    alias: Sunset
    event: sunset
    id: sun_event

action:
  # =========================================================
  #  AUTO ON/OFF: TURN ON (sensor_on, control_on)
  # =========================================================
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_auto_onoff }}"
          - condition: trigger
            id:
              - sensor_on
              - control_on
          - condition: template
            value_template: >-
              {% if trigger.id == 'control_on' %}
                {{ expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
              {% else %}
                {{ trigger.from_state.state not in ['unavailable', 'unknown'] }}
              {% endif %}
          - condition: template
            value_template: >-
              {{ control_entities in (none, [], '') or
                 expand(control_entities) | rejectattr('state', 'eq', 'on') | list | count == 0 }}
          - condition: template
            value_template: >-
              {{ trigger.id == 'control_on' or keep_on_open_doors or
                 state_attr(trigger.entity_id, 'device_class') in ['motion', 'occupancy', 'presence'] }}
          - condition: template
            value_template: >-
              {% set ls = light_sensors %}
              {% set thr = light_threshold | float(0) %}
              {% set has_night = night_only %}
              {% set has_lux = ls not in (none, [], '') and thr > 0 %}
              {% set night_ok = has_night and is_state('sun.sun', 'below_horizon') %}
              {% set lux_ok = has_lux and
                 (expand(ls) | map(attribute='state') | map('float', 0) | sum /
                  [expand(ls) | list | count, 1] | max) < thr %}
              {{ (not has_night and not has_lux) or night_ok or lux_ok }}
        sequence:
          - if:
              - condition: template
                value_template: "{{ enable_adaptive }}"
            then:
              - variables:
                  [[include:adaptive_variables.yaml]]
              - action: light.turn_on
                target: !input lights
                data:
                  brightness_pct: "{{ effective_brightness | int(0) }}"
                  color_temp_kelvin: "{{ effective_kelvin | int(0) }}"
                  transition: 1
            else:
              - action: light.turn_on
                target: !input lights

      # =========================================================
      #  AUTO ON/OFF: TURN OFF (sensor_off, control_off, ha_start)
      # =========================================================
      - conditions:
          - condition: template
            value_template: "{{ enable_auto_onoff }}"
          - condition: trigger
            id:
              - sensor_off
              - control_off
              - ha_start
        sequence:
          - wait_for_trigger:
              - trigger: state
                entity_id: !input sensors
                to: "on"
                not_from:
                  - "unavailable"
                  - "unknown"
            timeout: !input off_delay
            continue_on_timeout: true
          - condition: template
            value_template: "{{ wait.trigger is none }}"
          - condition: template
            value_template: >-
              {{ trigger.id == 'control_off' or
                 control_entities in (none, [], '') or
                 expand(control_entities) | rejectattr('state', 'eq', 'on') | list | count == 0 }}
          - condition: template
            value_template: >-
              {% if not keep_on_open_doors %}
                {{ expand(sensors)
                   | selectattr('attributes.device_class', 'in', ['motion', 'occupancy', 'presence'])
                   | selectattr('state', 'eq', 'on')
                   | list | count == 0 }}
              {% else %}
                {{ expand(sensors)
                   | selectattr('state', 'eq', 'on')
                   | list | count == 0 }}
              {% endif %}
          - action: light.turn_off
            target: !input lights

      # =========================================================
      #  AUTO ON/OFF: SWITCH TOGGLE
      # =========================================================
      - conditions:
          - condition: template
            value_template: "{{ enable_auto_onoff }}"
          - condition: trigger
            id:
              - switch_toggled
          - condition: template
            value_template: >-
              {% if trigger.platform == 'state' %}
                {% set match = trigger.entity_id in switch_event_entities %}
                {% set action = trigger.to_state.state | default('') %}
              {% elif trigger.platform == 'event' %}
                {% set match = trigger.event.data.device_id in switch_devices %}
                {% set action = trigger.event.data.command | default('') %}
              {% elif trigger.platform == 'mqtt' %}
                {% set device_name = trigger.topic.split('/')[1] %}
                {% set match = device_name in switch_device_names %}
                {% set action = trigger.payload | default('') %}
              {% else %}
                {% set match = false %}
                {% set action = '' %}
              {% endif %}
              {% set evt = switch_action %}
              {{ match and (evt in ('', none) or action == evt) }}
        sequence:
          - if:
              - condition: template
                value_template: >-
                  {{ expand(expanded_light_entities)
                     | selectattr('state', 'eq', 'on')
                     | list | count > 0 }}
            then:
              - action: light.turn_off
                target: !input lights
            else:
              - condition: template
                value_template: >-
                  {{ control_entities in (none, [], '') or
                     expand(control_entities) | rejectattr('state', 'eq', 'on') | list | count == 0 }}
              - condition: template
                value_template: >-
                  {% set ls = light_sensors %}
                  {% set thr = light_threshold | float(0) %}
                  {% set has_night = night_only %}
                  {% set has_lux = ls not in (none, [], '') and thr > 0 %}
                  {% set night_ok = has_night and is_state('sun.sun', 'below_horizon') %}
                  {% set lux_ok = has_lux and
                     (expand(ls) | map(attribute='state') | map('float', 0) | sum /
                      [expand(ls) | list | count, 1] | max) < thr %}
                  {{ (not has_night and not has_lux) or night_ok or lux_ok }}
              - if:
                  - condition: template
                    value_template: "{{ enable_adaptive }}"
                then:
                  - variables:
                      [[include:adaptive_variables.yaml]]
                  - action: light.turn_on
                    target: !input lights
                    data:
                      brightness_pct: "{{ effective_brightness | int(0) }}"
                      color_temp_kelvin: "{{ effective_kelvin | int(0) }}"
                      transition: 1
                else:
                  - action: light.turn_on
                    target: !input lights

      # =========================================================
      #  ADAPTIVE: HANDLE LIGHT STATE CHANGES
      #  (color mode deactivation, restore on off)
      # =========================================================
      - conditions:
          - condition: template
            value_template: "{{ enable_adaptive }}"
          - condition: trigger
            id:
              - light_state_changed
          - condition: template
            value_template: >
              {% set event = trigger.event.data if trigger.event is defined and trigger.event.data is defined else none %}
              {{ event is not none
                 and event.entity_id is defined
                 and event.entity_id in expanded_light_entities }}
        sequence:
          # Disable adaptive on color mode
          - if:
              - condition: template
                value_template: >
                  {% set event = trigger.event.data %}
                  {{ disable_on_color
                     and auto_mode_input_entity not in ['', none]
                     and auto_mode_input_entity.startswith('input_boolean.')
                     and event.new_state is not none
                     and event.new_state.state == 'on'
                     and event.new_state.attributes.color_mode is defined
                     and event.new_state.attributes.color_mode not in ['color_temp', 'white']
                     and (
                       event.old_state is none
                       or event.old_state.attributes.color_mode is not defined
                       or event.old_state.attributes.color_mode != event.new_state.attributes.color_mode
                     ) }}
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ auto_mode_input_entity }}"
              - stop: "Handled color mode change"
          # Restore control entity when all lights turn off
          - if:
              - condition: template
                value_template: >
                  {% set event = trigger.event.data %}
                  {{ restore_on_off
                     and auto_mode_input_entity not in ['', none]
                     and auto_mode_input_entity.startswith('input_boolean.')
                     and event.new_state is not none
                     and event.new_state.state == 'off'
                     and (expand(expanded_light_entities) | selectattr('state', 'eq', 'on') | list | count) == 0 }}
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ auto_mode_input_entity }}"
              - stop: "Restored control entity after all lights turned off"
          # Apply adaptive values when a light turns on
          - condition: template
            value_template: >
              {% set event = trigger.event.data %}
              {{ event.new_state is not none
                 and event.new_state.state == 'on'
                 and (event.old_state is none or event.old_state.state != 'on') }}
          - condition: template
            value_template: >
              {{ auto_mode_input_entity in ['', none]
                 or is_state(auto_mode_input_entity, 'on') }}
          - delay:
              milliseconds: 200
          - variables:
              [[include:adaptive_variables.yaml]]
              current_light: "{{ trigger.event.data.entity_id }}"
          - variables:
              [[include:light_capability_variables.yaml]]
          - choose:
              [[include:light_update_choose.yaml]]

      # =========================================================
      #  ADAPTIVE: PERIODIC UPDATE & SOLAR EVENTS
      #  (tick, sun_event, auto_mode_enabled, night_mode_changed,
      #   automations_reload_service)
      # =========================================================
      - conditions:
          - condition: template
            value_template: "{{ enable_adaptive }}"
          - condition: trigger
            id:
              - tick
              - sun_event
              - auto_mode_enabled
              - night_mode_changed
              - automations_reload_service
          - condition: template
            value_template: >
              {% if trigger.id == 'auto_mode_enabled' %}
                {{ auto_mode_input_entity not in ['', none]
                   and trigger.event is defined
                   and trigger.event.data is defined
                   and trigger.event.data.new_state is not none
                   and trigger.event.data.new_state.state == 'on'
                   and (trigger.event.data.old_state is none or trigger.event.data.old_state.state != 'on') }}
              {% elif trigger.id == 'night_mode_changed' %}
                {{ night_mode_entity_id not in ['', none]
                   and trigger.event is defined
                   and trigger.event.data is defined
                   and trigger.event.data.new_state is not none
                   and (trigger.event.data.old_state is none or trigger.event.data.old_state.state != trigger.event.data.new_state.state) }}
              {% else %}
                true
              {% endif %}
          - condition: template
            value_template: >
              {{ auto_mode_input_entity in ['', none]
                 or is_state(auto_mode_input_entity, 'on') }}
        sequence:
          - variables:
              on_lights: >
                {{ expand(expanded_light_entities)
                   | selectattr('state', 'eq', 'on')
                   | map(attribute='entity_id')
                   | list }}
          - condition: template
            value_template: "{{ on_lights | count > 0 }}"
          - variables:
              [[include:adaptive_variables.yaml]]
          - repeat:
              for_each: "{{ on_lights }}"
              sequence:
                - variables:
                    current_light: "{{ repeat.item }}"
                - variables:
                    [[include:light_capability_variables.yaml]]
                    tick_updates_brightness: "{{ trigger.id == 'tick' and ((now_ts | int(0) // 300) % 2 == 0) }}"
                    recently_turned_on: >
                      {% set last_changed_ts = as_timestamp(states[current_light].last_changed) | float(0) %}
                      {{ is_state(current_light, 'on') and ((now_ts | float(0)) - last_changed_ts) < 20 }}
                    current_brightness_pct: >
                      {% set b = state_attr(current_light, 'brightness') %}
                      {% if b is not none %}
                        {{ [1, [((b | float(0)) / 2.55) | round(0) | int, 100] | min] | max }}
                      {% else %}
                        {{ effective_brightness | int(0) }}
                      {% endif %}
                - choose:
                    - conditions:
                        - condition: template
                          value_template: >
                            {{ trigger.id == 'tick'
                               and supports_brightness
                               and supports_ct
                               and recently_turned_on }}
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 15
                            brightness_pct: "{{ effective_brightness | int(0) }}"
                            color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
                    - conditions:
                        - condition: template
                          value_template: >
                            {{ trigger.id == 'tick'
                               and supports_brightness
                               and supports_ct
                               and not recently_turned_on
                               and tick_updates_brightness }}
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 15
                            brightness_pct: "{{ effective_brightness | int(0) }}"
                    - conditions:
                        - condition: template
                          value_template: >
                            {{ trigger.id == 'tick'
                               and supports_brightness
                               and supports_ct
                               and not recently_turned_on
                               and not tick_updates_brightness }}
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 15
                            brightness_pct: "{{ effective_brightness | int(0) if night_mode_active else current_brightness_pct | int(0) }}"
                            color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
                    [[include:light_update_choose.yaml]]
                  default:
