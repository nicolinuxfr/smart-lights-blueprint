blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] — [Changelog](https://github.com/nicolinuxfr/smart-lights-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  source_url: https://github.com/nicolinuxfr/smart-lights-blueprint/blob/main/template.yaml
  input:
    [[include:inputs/root.yaml]]
    [[include:inputs/auto_onoff_basics.yaml]]
    [[include:inputs/auto_onoff_options.yaml]]
    [[include:inputs/adaptive_curve.yaml]]
    [[include:inputs/adaptive_options.yaml]]

mode: parallel
max: 10
max_exceeded: silent

trigger_variables:
  [[include:variables/trigger_inputs.yaml]]

variables:
  [[include:variables/common.yaml]]

trigger:
  [[include:triggers/auto_onoff.yaml]]
  [[include:triggers/adaptive.yaml]]

condition:
  [[include:conditions/event_gate.yaml]]
  [[include:conditions/adaptive_mode_gate.yaml]]
  [[include:conditions/proactive_adaptive_gate.yaml]]

action:
  - choose:
      - conditions:
          - "{{ auto_onoff_enabled | bool }}"
          - condition: trigger
            id:
              - sensor_on
              - control_on
        sequence:
          - variables:
              sensors_active: >-
                {% if trigger.id == 'control_on' %}
                  {{ expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
                {% else %}
                  {{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}
                {% endif %}
              controls_valid: >-
                {% set controls_on = control_entities_on %}
                {% set controls_off = control_entities_off %}
                {% set on_ok = controls_on in (none, [], '')
                   or expand(controls_on) | rejectattr('state', 'eq', 'on') | list | count == 0 %}
                {% set off_ok = controls_off in (none, [], '')
                   or expand(controls_off) | rejectattr('state', 'eq', 'off') | list | count == 0 %}
                {{ on_ok and off_ok }}
              turn_on_allowed: >-
                {% set ls = light_sensors %}
                {% set thr = light_threshold | float(0) %}
                {% set has_night = night_only %}
                {% set has_lux = ls not in (none, [], '') and thr > 0 %}
                {% set night_ok = has_night and is_state('sun.sun', 'below_horizon') %}
                {% set lux_ok = has_lux and
                   (expand(ls) | map(attribute='state') | map('float', 0) | sum /
                    [expand(ls) | list | count, 1] | max) < thr %}
                {{ (not has_night and not has_lux) or night_ok or lux_ok }}
          - condition: "{{ sensors_active | bool }}"
          - condition: "{{ controls_valid | bool }}"
          - condition: "{{ turn_on_allowed | bool }}"
          - if:
              - "{{ enable_adaptive | bool }}"
            then:
              - variables:
                  [[include:adaptive/variables.yaml]]
              - action: light.turn_on
                target: !input lights
                data:
                  brightness_pct: "{{ effective_brightness | int(0) }}"
                  color_temp_kelvin: "{{ effective_kelvin | int(0) }}"
                  transition: 1
            else:
              - action: light.turn_on
                target: !input lights

      - conditions:
          - "{{ auto_onoff_enabled | bool }}"
          - condition: trigger
            id:
              - sensor_off
              - control_off
              - ha_start
        sequence:
          - wait_for_trigger:
              - trigger: state
                entity_id: !input sensors
                to: "on"
                not_from:
                  - "unavailable"
                  - "unknown"
            timeout: !input off_delay
            continue_on_timeout: true
          - condition: "{{ wait.trigger is none }}"
          - variables:
              controls_valid: >-
                {% set controls_on = control_entities_on %}
                {% set controls_off = control_entities_off %}
                {% set on_ok = controls_on in (none, [], '')
                   or expand(controls_on) | rejectattr('state', 'eq', 'on') | list | count == 0 %}
                {% set off_ok = controls_off in (none, [], '')
                   or expand(controls_off) | rejectattr('state', 'eq', 'off') | list | count == 0 %}
                {{ on_ok and off_ok }}
              off_conditions_still_met: >-
                {% set controls_on = control_entities_on %}
                {% set controls_off = control_entities_off %}
                {% set has_controls = controls_on not in (none, [], '')
                   or controls_off not in (none, [], '') %}
                {% if trigger.id == 'control_off' %}
                  {{ has_controls and not (controls_valid | bool) }}
                {% else %}
                  {{ controls_valid | bool }}
                {% endif %}
              sensors_clear: >-
                {% if not keep_on_open_doors %}
                  {{ expand(sensors)
                     | selectattr('attributes.device_class', 'in', ['motion', 'occupancy', 'presence'])
                     | selectattr('state', 'eq', 'on')
                     | list | count == 0 }}
                {% else %}
                  {{ expand(sensors)
                     | selectattr('state', 'eq', 'on')
                     | list | count == 0 }}
                {% endif %}
          - condition: "{{ off_conditions_still_met | bool }}"
          - condition: "{{ sensors_clear | bool }}"
          - action: light.turn_off
            target: !input lights

      - conditions:
          - "{{ auto_onoff_enabled | bool }}"
          - condition: trigger
            id:
              - switch_toggled
        sequence:
          - variables:
              [[include:variables/switch_toggle_state.yaml]]
          [[include:actions/switch_toggle.yaml]]

      - conditions:
          - condition: trigger
            id:
              - light_state_changed
          - >
            {{ trigger.event is defined
               and trigger.event.data is defined
               and trigger.event.data.entity_id is defined
               and trigger.event.data.entity_id in expanded_light_entities
               and trigger.event.data.new_state is not none }}
        sequence:
          - variables:
              light_trigger_entity_id: "{{ trigger.event.data.entity_id }}"
              light_trigger_from_state: "{{ trigger.event.data.old_state }}"
              light_trigger_to_state: "{{ trigger.event.data.new_state }}"
              [[include:variables/light_group_state.yaml]]
          [[include:actions/sync_switch_entity.yaml]]
          - if:
              - >
                {{ (disable_on_color | bool)
                   and (auto_mode_is_input_boolean | bool)
                   and (light_switched_to_color | bool) }}
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ auto_mode_input_entity }}"
              - stop: "Handled color mode change"
          - if:
              - >
                {{ (restore_on_off | bool)
                   and (auto_mode_is_input_boolean | bool)
                   and light_trigger_to_state.state == 'off'
                   and (all_target_lights_off | bool) }}
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ auto_mode_input_entity }}"
              - stop: "Restored control entity after all lights turned off"
          - condition: "{{ enable_adaptive | bool }}"
          - condition: "{{ light_turned_on | bool }}"
          - condition: >
              {{ auto_mode_input_entity in ['', none]
                 or is_state(auto_mode_input_entity, 'on') }}
          - delay:
              milliseconds: 200
          - variables:
              [[include:adaptive/variables.yaml]]
              current_light: "{{ light_trigger_entity_id }}"
          - variables:
              [[include:adaptive/light_capabilities.yaml]]
          - choose:
              [[include:adaptive/light_update_choose.yaml]]

      - conditions:
          - "{{ enable_adaptive | bool }}"
          - condition: trigger
            id:
              - tick
              - sun_event
              - auto_mode_enabled
              - night_mode_changed
              - automations_reload_service
          - >
            {% if trigger.id == 'auto_mode_enabled' %}
              {{ auto_mode_input_entity not in ['', none]
                 and trigger.event is defined
                 and trigger.event.data is defined
                 and trigger.event.data.new_state is not none
                 and trigger.event.data.new_state.state == 'on'
                 and (trigger.event.data.old_state is none or trigger.event.data.old_state.state != 'on') }}
            {% elif trigger.id == 'night_mode_changed' %}
              {{ night_mode_entity_id not in ['', none]
                 and trigger.event is defined
                 and trigger.event.data is defined
                 and trigger.event.data.new_state is not none
                 and (trigger.event.data.old_state is none
                    or trigger.event.data.old_state.state != trigger.event.data.new_state.state) }}
            {% else %}
              true
            {% endif %}
          - >
            {{ auto_mode_input_entity in ['', none]
               or is_state(auto_mode_input_entity, 'on') }}
        sequence:
          - variables:
              on_lights: >
                {{ expand(expanded_light_entities)
                   | selectattr('state', 'eq', 'on')
                   | map(attribute='entity_id')
                   | list }}
          - condition: "{{ on_lights | count > 0 }}"
          - variables:
              [[include:adaptive/variables.yaml]]
          - repeat:
              for_each: "{{ on_lights }}"
              sequence:
                - variables:
                    current_light: "{{ repeat.item }}"
                - variables:
                    [[include:adaptive/light_capabilities.yaml]]
                    tick_updates_brightness: "{{ trigger.id == 'tick' and ((now_ts | int(0) // 300) % 2 == 0) }}"
                    recently_turned_on: >
                      {% set last_changed_ts = as_timestamp(states[current_light].last_changed) | float(0) %}
                      {{ is_state(current_light, 'on') and ((now_ts | float(0)) - last_changed_ts) < 20 }}
                    current_brightness_pct: >
                      {% set b = state_attr(current_light, 'brightness') %}
                      {% if b is not none %}
                        {{ [1, [((b | float(0)) / 2.55) | round(0) | int, 100] | min] | max }}
                      {% else %}
                        {{ effective_brightness | int(0) }}
                      {% endif %}
                - choose:
                    - conditions:
                        - >
                          {{ trigger.id == 'tick'
                             and (supports_brightness | bool)
                             and (supports_ct | bool)
                             and (recently_turned_on | bool) }}
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 15
                            brightness_pct: "{{ effective_brightness | int(0) }}"
                            color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
                    - conditions:
                        - >
                          {{ trigger.id == 'tick'
                             and (supports_brightness | bool)
                             and (supports_ct | bool)
                             and not (recently_turned_on | bool)
                             and (tick_updates_brightness | bool) }}
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 15
                            brightness_pct: "{{ effective_brightness | int(0) }}"
                    - conditions:
                        - >
                          {{ trigger.id == 'tick'
                             and (supports_brightness | bool)
                             and (supports_ct | bool)
                             and not (recently_turned_on | bool)
                             and not (tick_updates_brightness | bool) }}
                      sequence:
                        - action: light.turn_on
                          continue_on_error: true
                          target:
                            entity_id: "{{ current_light }}"
                          data:
                            transition: 15
                            brightness_pct: "{{ effective_brightness | int(0) if night_mode_active else current_brightness_pct | int(0) }}"
                            color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
                    [[include:adaptive/light_update_choose.yaml]]
                  default:
                    - action: light.turn_on
                      continue_on_error: true
                      target:
                        entity_id: "{{ current_light }}"
                      data:
                        transition: 1
