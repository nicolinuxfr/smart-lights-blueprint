blueprint:
  name: "[[blueprint.name]] ([[blueprint.version]])"
  description: |-
    [[blueprint.description]]

    [[blueprint.version.line]] — [Changelog](https://github.com/nicolinuxfr/smart-lights-blueprint/blob/main/CHANGELOG.md#[[blueprint.version.nodots]])
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  source_url: https://github.com/nicolinuxfr/smart-lights-blueprint/blob/main/template.yaml
  input:
    [[include:inputs.yaml]]

mode: parallel
max: 10
max_exceeded: silent
trace:
  stored_traces: 20

trigger_variables:
  control_entities_off_var: !input control_entities_off
  trigger_lights_target_var: !input lights

variables:
  [[include:variables.yaml]]

trigger:
  [[include:triggers.yaml]]

condition:
  [[include:conditions.yaml]]

action:
  - choose:
      - conditions:
          - "{{ auto_onoff_enabled | bool }}"
          - condition: trigger
            id:
              - sensor_on
              - control_on
        sequence:
          - variables:
              sensors_active: >-
                {% if trigger.id == 'control_on' %}
                  {{ expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
                {% else %}
                  {{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}
                {% endif %}
              adaptive_mode_active: >-
                {{ auto_mode_input_entity in ['', none]
                   or is_state(auto_mode_input_entity, 'on') }}
              controls_valid: >-
                {% set controls_off = control_entities_off %}
                {% set off_ok = controls_off in (none, [], '')
                   or expand(controls_off) | rejectattr('state', 'eq', 'off') | list | count == 0 %}
                {{ off_ok }}
              turn_on_allowed: >-
                {% set mode = auto_on_mode if auto_on_mode in ['day', 'night', 'always'] else 'day' %}
                {% if mode == 'always' %}
                  true
                {% elif mode == 'night' %}
                  {{ is_night_mode | bool }}
                {% else %}
                  {{ not (is_night_mode | bool) }}
                {% endif %}
          - condition: "{{ sensors_active | bool }}"
          - condition: "{{ controls_valid | bool }}"
          - condition: "{{ turn_on_allowed | bool }}"
          - if:
              - "{{ enable_adaptive | bool }}"
              - "{{ adaptive_mode_active | bool }}"
            then:
              - variables:
                  [[include:adaptive_variables.yaml]]
              - variables:
                  target_lights: "{{ expanded_light_entities }}"
              [[include:adaptive_light_turn_on.yaml]]
            else:
              - action: light.turn_on
                target: !input lights

      - conditions:
          - "{{ auto_onoff_enabled | bool }}"
          - condition: trigger
            id:
              - sensor_off
              - control_off
              - ha_start
              - automation_reenabled
        sequence:
          - condition: >-
              {% if trigger.id != 'automation_reenabled' %}
                true
              {% else %}
                {% set old_state = trigger.event.data.old_state
                   if trigger.event is defined
                   and trigger.event.data is defined
                   and trigger.event.data.old_state is defined
                   else none %}
                {% set new_state = trigger.event.data.new_state
                   if trigger.event is defined
                   and trigger.event.data is defined
                   and trigger.event.data.new_state is defined
                   else none %}
                {{ old_state is not none
                   and new_state is not none
                   and old_state.state == 'off'
                   and new_state.state == 'on'
                   and (
                     expand(expanded_light_entities)
                     | selectattr('state', 'eq', 'on')
                     | list | count
                   ) > 0 }}
              {% endif %}
          - wait_for_trigger:
              - trigger: state
                entity_id: !input sensors
                to: "on"
                not_from:
                  - "unavailable"
                  - "unknown"
            timeout: !input off_delay
            continue_on_timeout: true
          - condition: "{{ wait.trigger is none }}"
          - variables:
              controls_valid: >-
                {% set controls_off = control_entities_off %}
                {% set off_ok = controls_off in (none, [], '')
                   or expand(controls_off) | rejectattr('state', 'eq', 'off') | list | count == 0 %}
                {{ off_ok }}
              off_conditions_still_met: >-
                {% set controls_off = control_entities_off %}
                {% set has_controls = controls_off not in (none, [], '') %}
                {% if trigger.id == 'control_off' %}
                  {{ has_controls and not (controls_valid | bool) }}
                {% elif trigger.id == 'automation_reenabled' %}
                  {{ (controls_valid | bool) or (has_controls and not (controls_valid | bool)) }}
                {% else %}
                  {{ controls_valid | bool }}
                {% endif %}
              sensors_clear: >-
                {% if not keep_on_open_doors %}
                  {{ expand(sensors)
                     | selectattr('attributes.device_class', 'in', ['motion', 'occupancy', 'presence'])
                     | selectattr('state', 'eq', 'on')
                     | list | count == 0 }}
                {% else %}
                  {{ expand(sensors)
                     | selectattr('state', 'eq', 'on')
                     | list | count == 0 }}
                {% endif %}
          - condition: "{{ off_conditions_still_met | bool }}"
          - condition: "{{ sensors_clear | bool }}"
          - variables:
              restore_white_before_off: >-
                {{ (restore_on_off | bool)
                   and (enable_adaptive | bool)
                   and auto_mode_input_entity not in ['', none]
                   and auto_mode_input_entity.startswith('input_boolean.')
                   and is_state(auto_mode_input_entity, 'off') }}
          - if:
              - "{{ restore_white_before_off | bool }}"
            then:
              - variables:
                  [[include:adaptive_variables.yaml]]
              - variables:
                  effective_brightness: 1
                  effective_kelvin: 1
                  target_lights: >-
                    {{ expand(expanded_light_entities)
                       | selectattr('state', 'eq', 'on')
                       | map(attribute='entity_id')
                       | list }}
              [[include:adaptive_light_turn_on.yaml]]
          - action: light.turn_off
            target: !input lights

      - conditions:
          - "{{ auto_onoff_enabled | bool }}"
          - condition: trigger
            id:
              - switch_toggled
        sequence:
          - variables:
              switch_event_valid: >-
                {{ switch_entity not in ('', none)
                   and trigger.event is defined
                   and trigger.event.data is defined
                   and trigger.event.data.new_state is not none
                   and trigger.event.data.old_state is not none
                   and trigger.event.data.old_state.state not in ['unavailable', 'unknown']
                   and trigger.event.data.new_state.state not in ['unavailable', 'unknown'] }}
              switch_turning_on: >-
                {{ (switch_event_valid | bool) and trigger.event.data.new_state.state == 'on' }}
              switch_turning_off: >-
                {{ (switch_event_valid | bool) and trigger.event.data.new_state.state == 'off' }}
              target_lights_count: >-
                {{ expand(expanded_light_entities) | list | count }}
              target_lights_on_count: >-
                {{ expand(expanded_light_entities) | selectattr('state', 'eq', 'on') | list | count }}
              all_target_lights_off: >-
                {{ (target_lights_on_count | int(0)) == 0 }}
              all_target_lights_on: >-
                {{ (target_lights_count | int(0)) > 0
                   and (target_lights_on_count | int(0)) == (target_lights_count | int(0)) }}
              adaptive_mode_active: >-
                {{ auto_mode_input_entity in ['', none]
                   or is_state(auto_mode_input_entity, 'on') }}
          - condition: "{{ switch_event_valid | bool }}"
          - if:
              - "{{ switch_turning_off | bool }}"
              - "{{ not (all_target_lights_off | bool) }}"
            then:
              - variables:
                  restore_white_before_off: >-
                    {{ (restore_on_off | bool)
                       and (enable_adaptive | bool)
                       and auto_mode_input_entity not in ['', none]
                       and auto_mode_input_entity.startswith('input_boolean.')
                       and is_state(auto_mode_input_entity, 'off') }}
              - if:
                  - "{{ restore_white_before_off | bool }}"
                then:
                  - variables:
                      [[include:adaptive_variables.yaml]]
                  - variables:
                      effective_brightness: 1
                      effective_kelvin: 1
                      target_lights: >-
                        {{ expand(expanded_light_entities)
                           | selectattr('state', 'eq', 'on')
                           | map(attribute='entity_id')
                           | list }}
                  [[include:adaptive_light_turn_on.yaml]]
              - action: light.turn_off
                target: !input lights
            else:
              - if:
                  - "{{ switch_turning_on | bool }}"
                  - "{{ not (all_target_lights_on | bool) }}"
                then:
                  - if:
                      - "{{ enable_adaptive | bool }}"
                      - "{{ adaptive_mode_active | bool }}"
                    then:
                      - variables:
                          [[include:adaptive_variables.yaml]]
                      - variables:
                          target_lights: "{{ expanded_light_entities }}"
                      [[include:adaptive_light_turn_on.yaml]]
                    else:
                      - action: light.turn_on
                        target: !input lights

      - conditions:
          - condition: trigger
            id:
              - lights_all_on
        sequence:
          - if:
              - >
                {{ switch_entity not in ['', none]
                   and is_state(switch_entity, 'off') }}
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ switch_entity }}"

      - conditions:
          - condition: trigger
            id:
              - lights_all_off
        sequence:
          - if:
              - >
                {{ switch_entity not in ['', none]
                   and is_state(switch_entity, 'on') }}
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ switch_entity }}"
          - if:
              - >
                {{ (restore_on_off | bool)
                   and auto_mode_input_entity not in ['', none]
                   and auto_mode_input_entity.startswith('input_boolean.')
                   and is_state(auto_mode_input_entity, 'off') }}
            then:
              - action: input_boolean.turn_on
                target:
                  entity_id: "{{ auto_mode_input_entity }}"
              - stop: "Restored control entity after all lights turned off"

      - conditions:
          - "{{ enable_adaptive | bool }}"
          - condition: trigger
            id:
              - lights_any_on
          - >
            {{ auto_mode_input_entity in ['', none]
               or is_state(auto_mode_input_entity, 'on') }}
        sequence:
          - variables:
              on_lights: >
                {{ expand(expanded_light_entities)
                   | selectattr('state', 'eq', 'on')
                   | map(attribute='entity_id')
                   | list }}
          - condition: "{{ on_lights | count > 0 }}"
          - delay:
              milliseconds: 200
          - variables:
              [[include:adaptive_variables.yaml]]
          - variables:
              target_lights: "{{ on_lights }}"
          [[include:adaptive_light_turn_on.yaml]]

      - conditions:
          - "{{ enable_adaptive | bool }}"
          - condition: trigger
            id:
              - tick
              - sun_event
              - auto_mode_enabled
              - night_mode_changed
              - night_lux_changed
              - automations_reload_service
          - >
            {% if trigger.id == 'auto_mode_enabled' %}
              {{ auto_mode_input_entity not in ['', none]
                 and trigger.event is defined
                 and trigger.event.data is defined
                 and trigger.event.data.new_state is not none
                 and trigger.event.data.new_state.state == 'on'
                 and (trigger.event.data.old_state is none or trigger.event.data.old_state.state != 'on') }}
            {% elif trigger.id == 'night_mode_changed' %}
              {{ night_mode_entity_id not in ['', none]
                 and trigger.event is defined
                 and trigger.event.data is defined
                 and trigger.event.data.new_state is not none
                 and (trigger.event.data.old_state is none
                    or trigger.event.data.old_state.state != trigger.event.data.new_state.state) }}
            {% else %}
              true
            {% endif %}
          - >
            {{ auto_mode_input_entity in ['', none]
               or is_state(auto_mode_input_entity, 'on') }}
        sequence:
          - variables:
              on_lights: >
                {{ expand(expanded_light_entities)
                   | selectattr('state', 'eq', 'on')
                   | map(attribute='entity_id')
                   | list }}
              color_mode_lights: >
                {{ expand(expanded_light_entities)
                   | selectattr('state', 'eq', 'on')
                   | rejectattr('attributes.color_mode', 'in', [none, 'unknown', 'unavailable', 'color_temp', 'white', 'brightness', 'onoff'])
                   | map(attribute='entity_id')
                   | list }}
          - condition: "{{ on_lights | count > 0 }}"
          - if:
              - "{{ trigger.id == 'tick' }}"
              - "{{ disable_on_color | bool }}"
              - "{{ color_mode_lights | count > 0 }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ auto_mode_input_entity }}"
              - stop: "Disabled control entity on tick because a managed light is in color mode"
          - variables:
              [[include:adaptive_variables.yaml]]
          - repeat:
              for_each: "{{ on_lights }}"
              sequence:
                - variables:
                    current_light: "{{ repeat.item }}"
                - variables:
                    [[include:adaptive_light_common_variables.yaml]]
                    tick_updates_brightness: "{{ trigger.id == 'tick' and ((now_ts | int(0) // 300) % 2 == 0) }}"
                    recently_turned_on: >
                      {% set last_changed_ts = as_timestamp(states[current_light].last_changed) | float(0) %}
                      {{ is_state(current_light, 'on') and ((now_ts | float(0)) - last_changed_ts) < 20 }}
                    current_brightness_pct: >
                      {% set b = state_attr(current_light, 'brightness') %}
                      {% if b is not none %}
                        {{ [1, [((b | float(0)) / 2.55) | round(0) | int, 100] | min] | max }}
                      {% else %}
                        {{ effective_brightness | int(0) }}
                      {% endif %}
                - if:
                    - "{{ trigger.id == 'tick' }}"
                  then:
                    [[include:adaptive_tick_turn_on.yaml]]
                  else:
                    [[include:adaptive_light_turn_on.yaml]]
