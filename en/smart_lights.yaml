                    {% elif c == 'partlycloudy' %}
                      0.35
                    {% elif c == 'windy' %}
                      0.45
                    {% elif c in ['windy-variant', 'cloudy'] %}
                      0.55
                    {% elif c == 'snowy' %}
                      0.6
                    {% elif c in ['snowy-rainy', 'hail'] %}
                      0.65
                    {% elif c == 'fog' %}
                      0.75
                    {% elif c == 'rainy' %}
