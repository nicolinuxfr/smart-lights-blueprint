                  sunset_ts: "{{ (next_setting_ts | float(0)) + day_offset_s }}"
                  previous_sunrise_ts: "{{ (sunrise_ts | float(0)) - 86400 }}"
                  previous_sunset_ts: "{{ (sunset_ts | float(0)) - 86400 }}"
                  weather_condition_state: >
                    {% if weather_entity_id not in ['', none] %}
