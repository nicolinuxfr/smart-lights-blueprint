blueprint:
  name: "Smart Lights (2026.4.5)"
  description: |-
    Automatically turns lights on and off based on binary sensors (motion sensors, door sensors, etc.), with optional adaptive lighting that adjusts brightness and color temperature based on the sun's position.

    Version: 2026.4.5 — [Changelog](https://github.com/nicolinuxfr/smart-lights-blueprint/blob/main/CHANGELOG.md#202645)
  domain: automation
  homeassistant:
    min_version: 2024.6.0
  source_url: https://github.com/nicolinuxfr/smart-lights-blueprint/blob/main/template.yaml
  input:
    lights:
      name: "Lights"
      description: "The lights to control: a single light, a group of lights, or even a Home Assistant area or label."
      selector:
        target:
          entity:
            domain: light
    sensors:
      name: "Turn-on and turn-off sensors"
      description: "Sensors that drive automatic light turn-on and turn-off: works with motion and presence sensors, doors and windows, or any other type of binary sensor. Leave empty to use adaptive lighting only when the lights turn on."
      default: []
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    keep_on_open_doors:
          name: "Keep the light on with open doors"
          description: "By default, door sensors turn the light on when they open, but do not keep it on, and the lights turn off after the configured delay. When this option is enabled, door sensors are treated like the other types and the lights stay on as long as the doors remain open."
          default: false
          selector:
            boolean:
    off_delay:
      name: "Delay before turn-off"
      description: "Delay before turning the lights off when the sensors selected above become inactive (no more motion, door closed, etc.). If several sensors are selected, the delay only starts when all sensors are inactive."
      default:
        hours: 0
        minutes: 2
        seconds: 0
      selector:
        duration:
    switch_entity:
      name: "Turn-on with switch"
      description: "The input helper entity selected here turns the lights on and off regardless of the situation. Useful for working with a physical switch: another automation can toggle this helper to turn the lights on and off. Its state is also automatically synchronized with the lights."
      default: ""
      selector:
        entity:
          domain: input_boolean
    control_entities_off:
      name: "Control entities"
      description: "The selected input helpers must be disabled for automatic turn-on and turn-off to work. This can be used to disable the automation when nobody is home, for example."
      default: []
      selector:
        entity:
          domain: input_boolean
          multiple: true
    adaptive_section:
      name: "Adaptive lighting"
      icon: mdi:white-balance-sunny
      description: "Optional light adaptation throughout the day."
      collapsed: true
      input:
        enable_adaptive:
          name: "Enable adaptive lighting"
          description: "Automatically adjusts brightness and color temperature according to the sun's position throughout the day."
          default: false
          selector:
            boolean:
        brightness_night:
          name: "Minimum brightness"
          description: "Minimum brightness around sunrise and sunset."
          default: 30
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"
        brightness_day:
          name: "Maximum brightness"
          description: "Maximum brightness around the middle of the day."
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"
        kelvin_night:
          name: "Minimum temperature"
          description: "Warmest white temperature around sunrise and sunset."
          default: 2700
          selector:
            number:
              min: 1800
              max: 5000
              step: 50
              mode: slider
              unit_of_measurement: K
        kelvin_day:
          name: "Maximum temperature"
          description: "Coolest white temperature around the middle of the day."
          default: 5500
          selector:
            number:
              min: 2200
              max: 9000
              step: 50
              mode: slider
              unit_of_measurement: K
        night_adaptive_enabled:
          name: "Specific settings at night"
          description: "By default, the minimum values defined above are applied at night. Enable this option to use the following values instead."
          default: false
          selector:
            boolean:
        night_mode_brightness:
          name: "Night-specific brightness"
          description: "Brightness applied at night when the Specific settings at night option is enabled."
          default: 20
          selector:
            number:
              min: 1
              max: 100
              step: 1
              mode: slider
              unit_of_measurement: "%"
        night_mode_kelvin:
          name: "Night-specific temperature"
          description: "White temperature applied at night when the Specific settings at night option is enabled."
          default: 2200
          selector:
            number:
              min: 1800
              max: 5000
              step: 50
              mode: slider
              unit_of_measurement: K
        auto_mode_boolean:
          name: "Control entity"
          description: "The selected input helper must be active for adaptive lighting to run. When it is disabled, the lights keep their last setting and are still turned on and off automatically according to the settings above. Useful for stopping adaptive lighting without disabling the other automation features."
          default: ""
          selector:
            entity:
              domain: input_boolean
        restore_on_off:
          name: "Automatic re-activation"
          description: "If this option is enabled, the control entity above is automatically re-enabled when all managed lights turn off."
          default: false
          selector:
            boolean:
        disable_on_color:
          name: "Disable on color mode"
          description: "If this option is enabled, the control entity above is automatically disabled when one of the managed lights switches to color mode."
          default: false
          selector:
            boolean:
        weather_entity:
          name: "Adjust with the weather"
          description: "Optional weather entity used to slightly adjust adaptive brightness and white temperature according to the weather forecast."
          default: ""
          selector:
            entity:
              domain: weather
    night_section:
      name: "Night mode"
      icon: mdi:weather-night
      description: "Night settings."
      collapsed: true
      input:
        auto_on_mode:
          name: "Automatic turn-on"
          description: "Choose when automatic turn-on should be active. Night mode uses the criteria enabled below."
          default: day
          selector:
            select:
              options:
                - value: day
                  label: "Turn-on during the day"
                - value: night
                  label: "Turn-on at night"
                - value: always
                  label: "Always turn on"
        use_ha_sun_night:
          name: "Use sun position"
          description: "This option activates night mode while the sun is below the horizon. It can be disabled if one of the two optional sensors is configured."
          default: true
          selector:
            boolean:
        light_sensors:
          name: "Illuminance sensors (optional)"
          description: "Optionally, night mode can be activated when the brightness measured by the selected sensors goes below the threshold defined below. When several sensors are selected, the average is calculated automatically."
          default: []
          selector:
            entity:
              domain: sensor
              device_class: illuminance
              multiple: true
        light_threshold:
          name: "Illuminance threshold"
          description: "Brightness threshold used to switch between day mode and night mode. Ignored if no illuminance sensor has been selected above."
          default: 30
          selector:
            number:
              min: 0
              max: 1000
              unit_of_measurement: lx
              mode: box
        night_mode_entity:
          name: "Night mode entity (optional)"
          description: "The selected input helper also activates night mode, in addition to the other active criteria."
          default: ""
          selector:
            entity:
              filter:
                - domain: input_boolean
                - domain: binary_sensor

mode: parallel
max: 10
max_exceeded: silent
trace:
  stored_traces: 20

trigger_variables:
  control_entities_off_var: !input control_entities_off
  trigger_lights_target_var: !input lights

variables:
  lights: !input lights
  sensors: !input sensors
  switch_entity: !input switch_entity
  keep_on_open_doors: !input keep_on_open_doors
  light_sensors: !input light_sensors
  light_threshold: !input light_threshold
  control_entities_off: !input control_entities_off
  auto_mode_input_entity: !input auto_mode_boolean
  auto_on_mode: !input auto_on_mode
  use_ha_sun_night: !input use_ha_sun_night
  weather_entity_id: !input weather_entity
  night_mode_entity_id: !input night_mode_entity
  b_night: !input brightness_night
  b_day: !input brightness_day
  k_night: !input kelvin_night
  k_day: !input kelvin_day
  night_adaptive_enabled: !input night_adaptive_enabled
  nm_brightness: !input night_mode_brightness
  nm_kelvin: !input night_mode_kelvin
  enable_adaptive: !input enable_adaptive
  night_mode_entity_active: >-
    {{ night_mode_entity_id not in ['', none]
       and is_state(night_mode_entity_id, 'on') }}
  low_illuminance_active: >-
    {% set ls = light_sensors %}
    {% set thr = light_threshold | float(0) %}
    {% if ls in (none, [], '') or thr <= 0 %}
      false
    {% else %}
      {% set expanded = expand(ls) | list %}
      {% set average = (
        expanded | map(attribute='state') | map('float', 0) | sum /
        [expanded | count, 1] | max
      ) %}
      {{ average < thr }}
    {% endif %}
  is_night_mode: >-
    {{ ((use_ha_sun_night | bool) and is_state('sun.sun', 'below_horizon'))
       or (low_illuminance_active | bool)
       or (night_mode_entity_active | bool) }}
  night_adaptive_active: >-
    {{ (enable_adaptive | bool)
       and (night_adaptive_enabled | bool)
       and (is_night_mode | bool) }}
  restore_on_off: !input restore_on_off
  disable_on_color: !input disable_on_color
  auto_onoff_enabled: >-
    {% set has_sensors = sensors not in (none, [], '') %}
    {% set has_switch = switch_entity not in (none, '') %}
    {% set has_controls = control_entities_off not in (none, [], '') %}
    {{ has_sensors or has_switch or has_controls }}
  expanded_light_entities: >
    {% set target = lights %}
    {% set ns = namespace(entities=[]) %}
    {% if target.entity_id is defined %}
      {% set ids = [target.entity_id] if target.entity_id is string else target.entity_id %}
      {% for current_id in ids %}
        {% set member_ids = state_attr(current_id, 'entity_id') %}
        {% if member_ids is string %}
          {% set member_ids = [member_ids] %}
        {% endif %}
        {% if member_ids is sequence and member_ids is not string and (member_ids | count > 0) %}
          {% set expanded_ids = expand(member_ids) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
          {% set fallback_ids = member_ids | select('match', 'light\\.') | list %}
          {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else fallback_ids) %}
        {% else %}
          {% set expanded_ids = expand([current_id]) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
          {% set fallback_ids = [current_id] | select('match', 'light\\.') | list %}
          {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else fallback_ids) %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {% if target.area_id is defined %}
      {% set areas = [target.area_id] if target.area_id is string else target.area_id %}
      {% for a in areas %}
        {% set ns.entities = ns.entities + (area_entities(a) | select('match', 'light\\.') | list) %}
      {% endfor %}
    {% endif %}
    {% if target.device_id is defined %}
      {% set devices = [target.device_id] if target.device_id is string else target.device_id %}
      {% for d in devices %}
        {% set ns.entities = ns.entities + (device_entities(d) | select('match', 'light\\.') | list) %}
      {% endfor %}
    {% endif %}
    {{ ns.entities | unique | list }}

trigger:
  - trigger: state
    alias: "Sensor became active"
    entity_id: !input sensors
    to: "on"
    not_from:
      - "unavailable"
      - "unknown"
    id: sensor_on
  
  - trigger: state
    alias: "Sensor became inactive"
    entity_id: !input sensors
    to: "off"
    not_from:
      - "unavailable"
      - "unknown"
    id: sensor_off
  
  - trigger: state
    alias: "Sensor became available again"
    entity_id: !input sensors
    from: "unavailable"
    to: "off"
    id: ha_start
  
  - trigger: state
    alias: "Sensor became known again"
    entity_id: !input sensors
    from: "unknown"
    to: "off"
    id: ha_start
  
  - trigger: template
    value_template: >-
      {% set controls_off = control_entities_off_var %}
      {% set has_controls = controls_off not in (none, [], '') %}
      {% set off_ok = controls_off in (none, [], '') or
         expand(controls_off) | rejectattr('state', 'eq', 'off') | list | count == 0 %}
      {{ has_controls and off_ok }}
    id: control_on
  
  - trigger: template
    value_template: >-
      {% set controls_off = control_entities_off_var %}
      {% set has_controls = controls_off not in (none, [], '') %}
      {% set off_invalid = controls_off not in (none, [], '') and
         expand(controls_off) | selectattr('state', 'eq', 'on') | list | count > 0 %}
      {{ has_controls and off_invalid }}
    id: control_off
  
  - trigger: event
    alias: "Switch state changed"
    event_type: state_changed
    event_data:
      entity_id: !input switch_entity
    id: switch_toggled
  
  - trigger: template
    alias: "Automatic light adjustment"
    value_template: >-
      {% set target = trigger_lights_target_var %}
      {% set ns = namespace(entities=[]) %}
      {% if target.entity_id is defined %}
        {% set ids = [target.entity_id] if target.entity_id is string else target.entity_id %}
        {% for current_id in ids %}
          {% set member_ids = state_attr(current_id, 'entity_id') %}
          {% if member_ids is string %}
            {% set member_ids = [member_ids] %}
          {% endif %}
          {% if member_ids is sequence and member_ids is not string and (member_ids | count > 0) %}
            {% set expanded_ids = expand(member_ids) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set fallback_ids = member_ids | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else fallback_ids) %}
          {% else %}
            {% set expanded_ids = expand([current_id]) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set fallback_ids = [current_id] | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else fallback_ids) %}
          {% endif %}
        {% endfor %}
      {% endif %}
      {% if target.area_id is defined %}
        {% set areas = [target.area_id] if target.area_id is string else target.area_id %}
        {% for a in areas %}
          {% set ns.entities = ns.entities + (area_entities(a) | select('match', 'light\\.') | list) %}
        {% endfor %}
      {% endif %}
      {% if target.device_id is defined %}
        {% set devices = [target.device_id] if target.device_id is string else target.device_id %}
        {% for d in devices %}
          {% set ns.entities = ns.entities + (device_entities(d) | select('match', 'light\\.') | list) %}
        {% endfor %}
      {% endif %}
      {% set trigger_light_entities = ns.entities | unique | list %}
      {{ (now().minute % 5 == 0)
         and (
           expand(trigger_light_entities)
           | selectattr('state', 'eq', 'on')
           | list
           | count
         ) > 0 }}
    id: tick
  
  - trigger: event
    alias: "Control entity changed"
    event_type: state_changed
    event_data:
      entity_id: !input auto_mode_boolean
    id: auto_mode_enabled
  
  - trigger: event
    alias: "Night mode entity changed"
    event_type: state_changed
    event_data:
      entity_id: !input night_mode_entity
    id: night_mode_changed
  
  - trigger: state
    alias: "Illuminance sensor changed"
    entity_id: !input light_sensors
    id: night_lux_changed
  
  - trigger: event
    alias: "Automations reloaded"
    event_type: call_service
    event_data:
      domain: automation
      service: reload
    id: automations_reload_service
  
  - trigger: template
    alias: "Automation re-enabled"
    value_template: >-
      {{ is_state(this.entity_id, 'on') }}
    id: automation_reenabled
  
  - trigger: template
    alias: "A light turned on"
    value_template: >-
      {% set target = trigger_lights_target_var %}
      {% set ns = namespace(entities=[]) %}
      {% if target.entity_id is defined %}
        {% set ids = [target.entity_id] if target.entity_id is string else target.entity_id %}
        {% for current_id in ids %}
          {% set member_ids = state_attr(current_id, 'entity_id') %}
          {% if member_ids is string %}
            {% set member_ids = [member_ids] %}
          {% endif %}
          {% if member_ids is sequence and member_ids is not string and (member_ids | count > 0) %}
            {% set expanded_ids = expand(member_ids) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set fallback_ids = member_ids | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else fallback_ids) %}
          {% else %}
            {% set expanded_ids = expand([current_id]) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set fallback_ids = [current_id] | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else fallback_ids) %}
          {% endif %}
        {% endfor %}
      {% endif %}
      {% if target.area_id is defined %}
        {% set areas = [target.area_id] if target.area_id is string else target.area_id %}
        {% for a in areas %}
          {% set ns.entities = ns.entities + (area_entities(a) | select('match', 'light\\.') | list) %}
        {% endfor %}
      {% endif %}
      {% if target.device_id is defined %}
        {% set devices = [target.device_id] if target.device_id is string else target.device_id %}
        {% for d in devices %}
          {% set ns.entities = ns.entities + (device_entities(d) | select('match', 'light\\.') | list) %}
        {% endfor %}
      {% endif %}
      {% set trigger_light_entities = ns.entities | unique | list %}
      {{ expand(trigger_light_entities)
         | selectattr('state', 'eq', 'on')
         | list | count > 0 }}
    id: lights_any_on
  
  - trigger: template
    alias: "All lights turned on"
    value_template: >-
      {% set target = trigger_lights_target_var %}
      {% set ns = namespace(entities=[]) %}
      {% if target.entity_id is defined %}
        {% set ids = [target.entity_id] if target.entity_id is string else target.entity_id %}
        {% for current_id in ids %}
          {% set member_ids = state_attr(current_id, 'entity_id') %}
          {% if member_ids is string %}
            {% set member_ids = [member_ids] %}
          {% endif %}
          {% if member_ids is sequence and member_ids is not string and (member_ids | count > 0) %}
            {% set expanded_ids = expand(member_ids) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set fallback_ids = member_ids | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else fallback_ids) %}
          {% else %}
            {% set expanded_ids = expand([current_id]) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set fallback_ids = [current_id] | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else fallback_ids) %}
          {% endif %}
        {% endfor %}
      {% endif %}
      {% if target.area_id is defined %}
        {% set areas = [target.area_id] if target.area_id is string else target.area_id %}
        {% for a in areas %}
          {% set ns.entities = ns.entities + (area_entities(a) | select('match', 'light\\.') | list) %}
        {% endfor %}
      {% endif %}
      {% if target.device_id is defined %}
        {% set devices = [target.device_id] if target.device_id is string else target.device_id %}
        {% for d in devices %}
          {% set ns.entities = ns.entities + (device_entities(d) | select('match', 'light\\.') | list) %}
        {% endfor %}
      {% endif %}
      {% set trigger_light_entities = ns.entities | unique | list %}
      {% set on_count = expand(trigger_light_entities) | selectattr('state', 'eq', 'on') | list | count %}
      {% set total_count = expand(trigger_light_entities) | list | count %}
      {{ total_count > 0 and on_count == total_count }}
    id: lights_all_on
  
  - trigger: template
    alias: "All lights turned off"
    value_template: >-
      {% set target = trigger_lights_target_var %}
      {% set ns = namespace(entities=[]) %}
      {% if target.entity_id is defined %}
        {% set ids = [target.entity_id] if target.entity_id is string else target.entity_id %}
        {% for current_id in ids %}
          {% set member_ids = state_attr(current_id, 'entity_id') %}
          {% if member_ids is string %}
            {% set member_ids = [member_ids] %}
          {% endif %}
          {% if member_ids is sequence and member_ids is not string and (member_ids | count > 0) %}
            {% set expanded_ids = expand(member_ids) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set fallback_ids = member_ids | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else fallback_ids) %}
          {% else %}
            {% set expanded_ids = expand([current_id]) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set fallback_ids = [current_id] | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else fallback_ids) %}
          {% endif %}
        {% endfor %}
      {% endif %}
      {% if target.area_id is defined %}
        {% set areas = [target.area_id] if target.area_id is string else target.area_id %}
        {% for a in areas %}
          {% set ns.entities = ns.entities + (area_entities(a) | select('match', 'light\\.') | list) %}
        {% endfor %}
      {% endif %}
      {% if target.device_id is defined %}
        {% set devices = [target.device_id] if target.device_id is string else target.device_id %}
        {% for d in devices %}
          {% set ns.entities = ns.entities + (device_entities(d) | select('match', 'light\\.') | list) %}
        {% endfor %}
      {% endif %}
      {% set trigger_light_entities = ns.entities | unique | list %}
      {{ expand(trigger_light_entities)
         | selectattr('state', 'eq', 'on')
         | list | count == 0 }}
    id: lights_all_off
  
  - trigger: sun
    alias: "Sunrise"
    event: sunrise
    id: sun_event
  
  - trigger: sun
    alias: "Sunset"
    event: sunset
    id: sun_event

condition:
  - condition: template
    value_template: >
      {% set event = trigger.event.data if trigger.event is defined and trigger.event.data is defined else none %}
      {% set switch_event = trigger.id == 'switch_toggled'
         and switch_entity not in ['', none]
         and event is not none
         and event.new_state is not none
         and event.old_state is not none
         and event.old_state.state not in ['unavailable', 'unknown']
         and event.new_state.state not in ['unavailable', 'unknown'] %}
      {{ trigger.id not in ['switch_toggled', 'auto_mode_enabled', 'night_mode_changed']
         or switch_event
         or (
           trigger.id == 'auto_mode_enabled'
           and auto_mode_input_entity not in ['', none]
           and event is not none
           and event.new_state is not none
           and event.new_state.state == 'on'
           and (event.old_state is none or event.old_state.state != 'on')
         )
         or (
           trigger.id == 'night_mode_changed'
           and night_mode_entity_id not in ['', none]
           and event is not none
           and event.new_state is not none
           and (event.old_state is none or event.old_state.state != event.new_state.state)
         ) }}
  
  - condition: template
    value_template: >
      {{ trigger.id not in ['tick', 'sun_event', 'auto_mode_enabled', 'night_mode_changed', 'night_lux_changed', 'automations_reload_service']
         or auto_mode_input_entity in ['', none]
         or is_state(auto_mode_input_entity, 'on') }}
  
  - condition: template
    value_template: >
      {% set proactive_adaptive_trigger = trigger.id in ['tick', 'sun_event', 'auto_mode_enabled', 'night_mode_changed', 'night_lux_changed', 'automations_reload_service'] %}
      {{ not proactive_adaptive_trigger
         or (expand(expanded_light_entities) | selectattr('state', 'eq', 'on') | list | count) > 0 }}

action:
  - choose:
      - conditions:
          - "{{ auto_onoff_enabled | bool }}"
          - condition: trigger
            id:
              - sensor_on
              - control_on
        sequence:
          - variables:
              sensors_active: >-
                {% if trigger.id == 'control_on' %}
                  {{ expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
                {% else %}
                  {{ trigger.from_state is not none and trigger.from_state.state not in ['unavailable', 'unknown'] }}
                {% endif %}
              adaptive_mode_active: >-
