- conditions:
    - "{{ (supports_brightness | bool) and (supports_ct | bool) }}"
  sequence:
    - action: light.turn_on
      continue_on_error: true
      target:
        entity_id: "{{ current_light }}"
      data:
        transition: 1
        brightness_pct: "{{ effective_brightness | int(0) }}"
        color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
- conditions:
    - "{{ supports_brightness | bool }}"
  sequence:
    - action: light.turn_on
      continue_on_error: true
      target:
        entity_id: "{{ current_light }}"
      data:
        transition: 1
        brightness_pct: "{{ effective_brightness | int(0) }}"
- conditions:
    - "{{ supports_ct | bool }}"
  sequence:
    - action: light.turn_on
      continue_on_error: true
      target:
        entity_id: "{{ current_light }}"
      data:
        transition: 1
        color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
