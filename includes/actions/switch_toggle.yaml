- condition: "{{ switch_event_valid | bool }}"
- if:
    - "{{ switch_turning_off | bool }}"
    - "{{ not (all_target_lights_off | bool) }}"
  then:
    - action: light.turn_off
      target: !input lights
  else:
    - if:
        - "{{ switch_turning_on | bool }}"
        - "{{ not (all_target_lights_on | bool) }}"
      then:
        - if:
            - "{{ enable_adaptive | bool }}"
          then:
            - variables:
                [[include:adaptive/variables.yaml]]
            - action: light.turn_on
              target: !input lights
              data:
                brightness_pct: "{{ effective_brightness | int(0) }}"
                color_temp_kelvin: "{{ effective_kelvin | int(0) }}"
                transition: 1
          else:
            - action: light.turn_on
              target: !input lights
