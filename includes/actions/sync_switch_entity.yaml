- if:
    - >
      {{ (switch_entity_configured | bool)
         and (light_turned_on | bool)
         and (all_target_lights_on | bool)
         and is_state(switch_entity, 'off') }}
  then:
    - action: input_boolean.turn_on
      target:
        entity_id: "{{ switch_entity }}"
- if:
    - >
      {{ (switch_entity_configured | bool)
         and light_trigger_to_state.state == 'off'
         and (all_target_lights_off | bool)
         and is_state(switch_entity, 'on') }}
  then:
    - action: input_boolean.turn_off
      target:
        entity_id: "{{ switch_entity }}"
