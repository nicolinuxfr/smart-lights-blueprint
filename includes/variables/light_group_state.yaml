switch_entity_configured: >-
  {{ switch_entity not in ['', none] }}
auto_mode_is_input_boolean: >-
  {{ auto_mode_input_entity not in ['', none]
     and auto_mode_input_entity.startswith('input_boolean.') }}
all_target_lights_on: >-
  {% set on_count = expand(expanded_light_entities) | selectattr('state', 'eq', 'on') | list | count %}
  {% set total_count = expand(expanded_light_entities) | list | count %}
  {{ total_count > 0 and on_count == total_count }}
all_target_lights_off: >-
  {{ (expand(expanded_light_entities) | selectattr('state', 'eq', 'on') | list | count) == 0 }}
light_switched_to_color: >-
  {{ light_trigger_to_state.state == 'on'
     and light_trigger_to_state.attributes.color_mode is defined
     and light_trigger_to_state.attributes.color_mode not in ['color_temp', 'white']
     and (
       light_trigger_from_state is none
       or light_trigger_from_state.attributes.color_mode is not defined
       or light_trigger_from_state.attributes.color_mode != light_trigger_to_state.attributes.color_mode
     ) }}
light_turned_on: >-
  {{ light_trigger_to_state.state == 'on'
     and (light_trigger_from_state is none or light_trigger_from_state.state != 'on') }}
