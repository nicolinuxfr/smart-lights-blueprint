- repeat:
    for_each: "{{ target_lights }}"
    sequence:
      - variables:
          current_light: "{{ repeat.item }}"
      - variables:
          [[include:adaptive_light_common_variables.yaml]]
      - choose:
          - conditions:
              - "{{ (supports_brightness | bool) and (supports_ct | bool) and (force_ct_mode_switch | bool) and (prefers_mired_ct | bool) }}"
            sequence:
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 0
                  color_temp: "{{ clamped_mired | int(0) }}"
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 1
                  brightness_pct: "{{ effective_brightness | int(0) }}"
                  color_temp: "{{ clamped_mired | int(0) }}"
          - conditions:
              - "{{ (supports_brightness | bool) and (supports_ct | bool) and (force_ct_mode_switch | bool) }}"
            sequence:
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 0
                  color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 1
                  brightness_pct: "{{ effective_brightness | int(0) }}"
                  color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
          - conditions:
              - "{{ (supports_brightness | bool) and (supports_ct | bool) and (prefers_mired_ct | bool) }}"
            sequence:
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 1
                  brightness_pct: "{{ effective_brightness | int(0) }}"
                  color_temp: "{{ clamped_mired | int(0) }}"
          - conditions:
              - "{{ (supports_brightness | bool) and (supports_ct | bool) }}"
            sequence:
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 1
                  brightness_pct: "{{ effective_brightness | int(0) }}"
                  color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
          - conditions:
              - "{{ supports_brightness | bool }}"
            sequence:
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 1
                  brightness_pct: "{{ effective_brightness | int(0) }}"
          - conditions:
              - "{{ (supports_ct | bool) and (force_ct_mode_switch | bool) and (prefers_mired_ct | bool) }}"
            sequence:
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 0
                  color_temp: "{{ clamped_mired | int(0) }}"
          - conditions:
              - "{{ (supports_ct | bool) and (force_ct_mode_switch | bool) }}"
            sequence:
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 0
                  color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
          - conditions:
              - "{{ (supports_ct | bool) and (prefers_mired_ct | bool) }}"
            sequence:
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 1
                  color_temp: "{{ clamped_mired | int(0) }}"
          - conditions:
              - "{{ supports_ct | bool }}"
            sequence:
              - action: light.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ current_light }}"
                data:
                  transition: 1
                  color_temp_kelvin: "{{ clamped_kelvin | int(0) }}"
        default:
          - action: light.turn_on
            continue_on_error: true
            target:
              entity_id: "{{ current_light }}"
