- trigger: state
  alias: Sensor turned on
  entity_id: !input sensors
  to: "on"
  not_from:
    - "unavailable"
    - "unknown"
  id: sensor_on

- trigger: state
  alias: Sensor turned off
  entity_id: !input sensors
  to: "off"
  not_from:
    - "unavailable"
    - "unknown"
  id: sensor_off

- trigger: state
  alias: Sensor recovered from unavailable
  entity_id: !input sensors
  from: "unavailable"
  to: "off"
  id: ha_start

- trigger: state
  alias: Sensor recovered from unknown
  entity_id: !input sensors
  from: "unknown"
  to: "off"
  id: ha_start

- trigger: template
  value_template: >-
    {% set controls_on = control_entities_on_var %}
    {% set controls_off = control_entities_off_var %}
    {% set has_controls = controls_on not in (none, [], '') or controls_off not in (none, [], '') %}
    {% set on_ok = controls_on in (none, [], '') or
       expand(controls_on) | rejectattr('state', 'eq', 'on') | list | count == 0 %}
    {% set off_ok = controls_off in (none, [], '') or
       expand(controls_off) | rejectattr('state', 'eq', 'off') | list | count == 0 %}
    {{ has_controls and on_ok and off_ok }}
  id: control_on

- trigger: template
  value_template: >-
    {% set controls_on = control_entities_on_var %}
    {% set controls_off = control_entities_off_var %}
    {% set has_controls = controls_on not in (none, [], '') or controls_off not in (none, [], '') %}
    {% set on_invalid = controls_on not in (none, [], '') and
       expand(controls_on) | selectattr('state', 'eq', 'off') | list | count > 0 %}
    {% set off_invalid = controls_off not in (none, [], '') and
       expand(controls_off) | selectattr('state', 'eq', 'on') | list | count > 0 %}
    {{ has_controls and (on_invalid or off_invalid) }}
  id: control_off

- trigger: event
  alias: Switch entity changed
  event_type: state_changed
  event_data:
    entity_id: !input switch_entity
  id: switch_toggled
