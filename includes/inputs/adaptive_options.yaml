adaptive_options_section:
  name: "[[section.adaptive.options]]"
  icon: mdi:tune-vertical
  description: "[[section.adaptive.options.description]]"
  collapsed: true
  input:
    auto_mode_boolean:
      name: "[[input.auto_mode_boolean.name]]"
      description: "[[input.auto_mode_boolean.description]]"
      default: ""
      selector:
        entity:
          filter:
            - domain: input_boolean
            - domain: binary_sensor
    restore_on_off:
      name: "[[input.restore_on_off.name]]"
      description: "[[input.restore_on_off.description]]"
      default: false
      selector:
        boolean:
    disable_on_color:
      name: "[[input.disable_on_color.name]]"
      description: "[[input.disable_on_color.description]]"
      default: false
      selector:
        boolean:
    weather_entity:
      name: "[[input.weather_entity.name]]"
      description: "[[input.weather_entity.description]]"
      default: ""
      selector:
        entity:
          domain: weather
