adaptive_curve_section:
  name: "[[section.adaptive.curve]]"
  icon: mdi:white-balance-sunny
  description: "[[section.adaptive.curve.description]]"
  collapsed: true
  input:
    brightness_night:
      name: "[[input.brightness_night.name]]"
      description: "[[input.brightness_night.description]]"
      default: 30
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"
    brightness_day:
      name: "[[input.brightness_day.name]]"
      description: "[[input.brightness_day.description]]"
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"
    kelvin_night:
      name: "[[input.kelvin_night.name]]"
      description: "[[input.kelvin_night.description]]"
      default: 2700
      selector:
        number:
          min: 1800
          max: 5000
          step: 50
          mode: slider
          unit_of_measurement: K
    kelvin_day:
      name: "[[input.kelvin_day.name]]"
      description: "[[input.kelvin_day.description]]"
      default: 5500
      selector:
        number:
          min: 2200
          max: 9000
          step: 50
          mode: slider
          unit_of_measurement: K
    night_mode_entity:
      name: "[[input.night_mode_entity.name]]"
      description: "[[input.night_mode_entity.description]]"
      default: ""
      selector:
        entity:
          filter:
            - domain: input_boolean
            - domain: binary_sensor
    night_mode_brightness:
      name: "[[input.night_mode_brightness.name]]"
      description: "[[input.night_mode_brightness.description]]"
      default: 20
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"
    night_mode_kelvin:
      name: "[[input.night_mode_kelvin.name]]"
      description: "[[input.night_mode_kelvin.description]]"
      default: 2200
      selector:
        number:
          min: 1800
          max: 5000
          step: 50
          mode: slider
          unit_of_measurement: K
