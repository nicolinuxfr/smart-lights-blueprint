- trigger: state
  alias: "[[trigger.sensor_on]]"
  entity_id: !input sensors
  to: "on"
  not_from:
    - "unavailable"
    - "unknown"
  id: sensor_on

- trigger: state
  alias: "[[trigger.sensor_off]]"
  entity_id: !input sensors
  to: "off"
  not_from:
    - "unavailable"
    - "unknown"
  id: sensor_off

- trigger: state
  alias: "[[trigger.sensor_recovered_unavailable]]"
  entity_id: !input sensors
  from: "unavailable"
  to: "off"
  id: ha_start

- trigger: state
  alias: "[[trigger.sensor_recovered_unknown]]"
  entity_id: !input sensors
  from: "unknown"
  to: "off"
  id: ha_start

- trigger: template
  value_template: >-
    {% set controls_off = control_entities_off_var %}
    {% set has_controls = controls_off not in (none, [], '') %}
    {% set off_ok = controls_off in (none, [], '') or
       expand(controls_off) | rejectattr('state', 'eq', 'off') | list | count == 0 %}
    {{ has_controls and off_ok }}
  id: control_on

- trigger: template
  value_template: >-
    {% set controls_off = control_entities_off_var %}
    {% set has_controls = controls_off not in (none, [], '') %}
    {% set off_invalid = controls_off not in (none, [], '') and
       expand(controls_off) | selectattr('state', 'eq', 'on') | list | count > 0 %}
    {{ has_controls and off_invalid }}
  id: control_off

- trigger: event
  alias: "[[trigger.switch_entity_changed]]"
  event_type: state_changed
  event_data:
    entity_id: !input switch_entity
  id: switch_toggled

- trigger: template
  alias: "[[trigger.tick_while_managed_lights_on]]"
  value_template: >-
    {{ (now().minute % 5 == 0)
       and (
         expand(expanded_light_entities)
         | selectattr('state', 'eq', 'on')
         | list
         | count
       ) > 0 }}
  id: tick

- trigger: event
  alias: "[[trigger.auto_mode_entity_changed]]"
  event_type: state_changed
  event_data:
    entity_id: !input auto_mode_boolean
  id: auto_mode_enabled

- trigger: event
  alias: "[[trigger.night_mode_entity_changed]]"
  event_type: state_changed
  event_data:
    entity_id: !input night_mode_entity
  id: night_mode_changed

- trigger: state
  alias: "[[trigger.night_illuminance_changed]]"
  entity_id: !input light_sensors
  id: night_lux_changed

- trigger: event
  alias: "[[trigger.automations_reloaded]]"
  event_type: call_service
  event_data:
    domain: automation
    service: reload
  id: automations_reload_service

- trigger: template
  alias: "[[trigger.automation_reenabled]]"
  value_template: >-
    {{ is_state(this.entity_id, 'on') }}
  id: automation_reenabled

- trigger: template
  alias: "[[trigger.first_managed_light_turned_on]]"
  value_template: >-
    {{ expand(expanded_light_entities)
       | selectattr('state', 'eq', 'on')
       | list | count > 0 }}
  id: lights_any_on

- trigger: template
  alias: "[[trigger.all_managed_lights_turned_on]]"
  value_template: >-
    {% set on_count = expand(expanded_light_entities) | selectattr('state', 'eq', 'on') | list | count %}
    {% set total_count = expand(expanded_light_entities) | list | count %}
    {{ total_count > 0 and on_count == total_count }}
  id: lights_all_on

- trigger: template
  alias: "[[trigger.managed_light_switched_to_color_mode]]"
  value_template: >-
    {% set ns = namespace(color_lights=[]) %}
    {% for current_light in expanded_light_entities %}
      {% if is_state(current_light, 'on') %}
        {% set current_mode = state_attr(current_light, 'color_mode') %}
        {% set has_color_attrs = state_attr(current_light, 'hs_color') is not none
           or state_attr(current_light, 'rgb_color') is not none
           or state_attr(current_light, 'rgbw_color') is not none
           or state_attr(current_light, 'rgbww_color') is not none
           or state_attr(current_light, 'xy_color') is not none %}
        {% if current_mode not in [none, 'unknown', 'unavailable', 'color_temp', 'white', 'brightness', 'onoff'] or has_color_attrs %}
          {% set ns.color_lights = ns.color_lights + [current_light] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ (ns.color_lights | count) > 0 }}
  id: lights_color_mode_active

- trigger: template
  alias: "[[trigger.all_managed_lights_turned_off]]"
  value_template: >-
    {{ expand(expanded_light_entities)
       | selectattr('state', 'eq', 'on')
       | list | count == 0 }}
  id: lights_all_off

- trigger: sun
  alias: "[[trigger.sunrise]]"
  event: sunrise
  id: sun_event

- trigger: sun
  alias: "[[trigger.sunset]]"
  event: sunset
  id: sun_event
