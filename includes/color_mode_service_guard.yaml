- if:
    - "{{ trigger.id == 'light_turn_on_service_called' }}"
  then:
    - condition: >-
        {{ (disable_on_color | bool)
           and auto_mode_input_entity not in ['', none]
           and auto_mode_input_entity.startswith('input_boolean.')
           and is_state(auto_mode_input_entity, 'on') }}
    - variables:
        service_data: >-
          {{ trigger.event.data.service_data
             if trigger.event is defined
             and trigger.event.data is defined
             and trigger.event.data.service_data is defined
             else dict() }}
        service_target: >-
          {{ trigger.event.data.service_data.target
             if trigger.event is defined
             and trigger.event.data is defined
             and trigger.event.data.service_data is defined
             and trigger.event.data.service_data.target is defined
             else (
               trigger.event.data.target
               if trigger.event is defined
               and trigger.event.data is defined
               and trigger.event.data.target is defined
               else dict()
             ) }}
        service_target_entities: >-
          {% set ns = namespace(entities=[]) %}
          {% set target_entity_id = service_data.entity_id if service_data.entity_id is defined else none %}
          {% if target_entity_id is string %}
            {% set ids = [target_entity_id] %}
            {% set expanded_ids = expand(ids) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else (ids | select('match', 'light\\.') | list)) %}
          {% elif target_entity_id is sequence and target_entity_id is not string %}
            {% set ids = target_entity_id | list %}
            {% set expanded_ids = expand(ids) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else (ids | select('match', 'light\\.') | list)) %}
          {% endif %}
          {% set nested_entity_id = service_target.entity_id if service_target.entity_id is defined else none %}
          {% if nested_entity_id is string %}
            {% set ids = [nested_entity_id] %}
            {% set expanded_ids = expand(ids) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else (ids | select('match', 'light\\.') | list)) %}
          {% elif nested_entity_id is sequence and nested_entity_id is not string %}
            {% set ids = nested_entity_id | list %}
            {% set expanded_ids = expand(ids) | map(attribute='entity_id') | select('match', 'light\\.') | list %}
            {% set ns.entities = ns.entities + (expanded_ids if (expanded_ids | count > 0) else (ids | select('match', 'light\\.') | list)) %}
          {% endif %}
          {% set target_area_id = service_data.area_id if service_data.area_id is defined else none %}
          {% if target_area_id in [none, ''] %}
            {% set target_area_id = service_target.area_id if service_target.area_id is defined else none %}
          {% endif %}
          {% if target_area_id is string %}
            {% set ns.entities = ns.entities + (area_entities(target_area_id) | select('match', 'light\\.') | list) %}
          {% elif target_area_id is sequence and target_area_id is not string %}
            {% for current_area in target_area_id %}
              {% set ns.entities = ns.entities + (area_entities(current_area) | select('match', 'light\\.') | list) %}
            {% endfor %}
          {% endif %}
          {% set target_device_id = service_data.device_id if service_data.device_id is defined else none %}
          {% if target_device_id in [none, ''] %}
            {% set target_device_id = service_target.device_id if service_target.device_id is defined else none %}
          {% endif %}
          {% if target_device_id is string %}
            {% set ns.entities = ns.entities + (device_entities(target_device_id) | select('match', 'light\\.') | list) %}
          {% elif target_device_id is sequence and target_device_id is not string %}
            {% for current_device in target_device_id %}
              {% set ns.entities = ns.entities + (device_entities(current_device) | select('match', 'light\\.') | list) %}
            {% endfor %}
          {% endif %}
          {{ ns.entities | unique | list }}
        color_service_requested: >-
          {{ (service_data.color is defined and service_data.color not in [none, ''])
             or (service_data.rgb_color is defined and service_data.rgb_color not in [none, '', []])
             or (service_data.rgbw_color is defined and service_data.rgbw_color not in [none, '', []])
             or (service_data.rgbww_color is defined and service_data.rgbww_color not in [none, '', []])
             or (service_data.hs_color is defined and service_data.hs_color not in [none, '', []])
             or (service_data.xy_color is defined and service_data.xy_color not in [none, '', []])
             or (service_data.color_name is defined and service_data.color_name not in [none, '']) }}
        managed_color_service_targeted: >-
          {{ service_target_entities
             | select('in', expanded_light_entities)
             | list
             | count > 0 }}
    - condition: "{{ color_service_requested | bool }}"
    - condition: "{{ managed_color_service_targeted | bool }}"
