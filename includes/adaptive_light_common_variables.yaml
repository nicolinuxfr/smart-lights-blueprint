variables:
  modes: "{{ state_attr(current_light, 'supported_color_modes') or [] }}"
  modes_count: "{{ modes | count }}"
  min_k: "{{ state_attr(current_light, 'min_color_temp_kelvin') | float(0) }}"
  max_k: "{{ state_attr(current_light, 'max_color_temp_kelvin') | float(0) }}"
  has_brightness_attr: "{{ state_attr(current_light, 'brightness') is not none }}"
  has_ct_kelvin_attr: "{{ state_attr(current_light, 'color_temp_kelvin') is not none }}"
  has_ct_attr: "{{ state_attr(current_light, 'color_temp') is not none }}"
  current_color_mode: "{{ state_attr(current_light, 'color_mode') }}"
  onoff_only: "{{ (modes_count == 1) and (modes[0] == 'onoff') }}"
  supports_ct: >
    {{ 'color_temp' in modes
       or (min_k > 0 and max_k > 0)
       or has_ct_kelvin_attr
       or has_ct_attr }}
  supports_brightness: >
    {{ has_brightness_attr
       or (modes_count == 0)
       or not onoff_only }}
  prefers_mired_ct: >
    {{ (has_ct_attr or ('color_temp' in modes))
       and not has_ct_kelvin_attr }}
  force_ct_mode_switch: >
    {{ current_color_mode in ['xy', 'hs', 'rgb', 'rgbw', 'rgbww'] }}
  clamped_kelvin: >
    {% if min_k > 0 and max_k > 0 %}
      {{ [min_k, [effective_kelvin | float(0), max_k] | min] | max | round(0) | int }}
    {% else %}
      {{ effective_kelvin | int(0) }}
    {% endif %}
  clamped_mired: >
    {{ (1000000 / [clamped_kelvin | float(1), 1] | max) | round(0) | int }}
